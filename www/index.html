function rand(a, b) { return a + Math.random() * (b - a); }

function initDecor() {
  // Bubbles — evenly scattered, count scales with area
  bubbles = [];
  var bubbleCount = Math.max(20, Math.floor((W * H) / 22000));
  for (var i = 0; i < bubbleCount; i++) {
    bubbles.push({
      x: ((i + 0.5) / bubbleCount) * W + rand(-30, 30),
      y: rand(0, H),
      r: rand(2, 7), sp: rand(20, 60), wob: rand(0, Math.PI * 2)
    });
  }

  // Jellyfish — proportional count, alternating directions, evenly spaced
  jellies = [];
  var jellyCount = Math.max(3, Math.floor(W / 200));
  var jellyBand = H * 0.55; // upper-middle band
  for (var j = 0; j < jellyCount; j++) {
    var dir = j % 2 === 0 ? 1 : -1;
    jellies.push({
      x: ((j + 0.5) / jellyCount) * W,
      y: H * 0.15 + ((j * 0.37) % 1) * jellyBand,
      r: rand(18, 30), hue: rand(280, 330),
      ph: rand(0, Math.PI * 2),
      sp: rand(35, 60) * dir,
      bob: rand(0, Math.PI * 2)
    });
  }

  // Schools — alternating directions across mid band
  schools = [];
  var schoolCount = Math.max(2, Math.floor(W / 350));
  for (var k = 0; k < schoolCount; k++) {
    var sdir = k % 2 === 0 ? -1 : 1;
    schools.push({
      x: sdir > 0 ? -200 - k * 300 : W + 200 + k * 300,
      y: H * 0.2 + ((k + 0.5) / schoolCount) * H * 0.55,
      sp: rand(45, 75) * sdir,
      count: 7, ph: rand(0, Math.PI * 2)
    });
  }

  // Seaweed — evenly spaced, scales with width
  seaweed = [];
  var n = Math.max(6, Math.floor(W / 75));
  for (var s = 0; s < n; s++) {
    seaweed.push({
      x: (s + 0.5) * (W / n) + rand(-10, 10),
      h: rand(60, 130), ph: rand(0, Math.PI * 2), hue: rand(140, 180)
    });
  }

  // Turtles — at least one going each way on wider screens
  turtles = [];
  var turtleCount = W > 700 ? 2 : 1;
  for (var t = 0; t < turtleCount; t++) {
    var tdir = t % 2 === 0 ? 1 : -1;
    turtles.push({
      x: tdir > 0 ? -120 - t * 400 : W + 120 + t * 400,
      y: H * 0.3 + (t / Math.max(1, turtleCount - 1 || 1)) * H * 0.3,
      sp: rand(18, 28), ph: rand(0, Math.PI * 2), dir: tdir
    });
  }

  // Seahorses — couple of them, spaced
  seahorses = [];
  var seahorseCount = Math.max(1, Math.floor(W / 400));
  for (var sh = 0; sh < seahorseCount; sh++) {
    seahorses.push({
      x: ((sh + 0.5) / seahorseCount) * W,
      y: H * 0.45 + (sh % 2) * H * 0.15,
      ph: rand(0, Math.PI * 2), sp: rand(8, 14)
    });
  }

  // Starfish — evenly spaced on the floor
  starfish = [];
  var sfCount = Math.max(3, Math.floor(W / 180));
  for (var sf = 0; sf < sfCount; sf++) {
    starfish.push({
      x: ((sf + 0.5) / sfCount) * W + rand(-12, 12),
      hue: rand(0, 40), size: rand(10, 16), rot: rand(0, Math.PI * 2)
    });
  }

  // Crabs — alternating direction
  crabs = [];
  var crabCount = W > 600 ? 2 : 1;
  for (var cb = 0; cb < crabCount; cb++) {
    crabs.push({
      x: ((cb + 0.5) / crabCount) * W,
      dir: cb % 2 === 0 ? -1 : 1,
      sp: rand(20, 35), wob: 0
    });
  }

  // Scuba diver — single, enters from one side
  diver = { x: -100, y: H * 0.35, ph: 0, kick: 0, bubbleTimer: 0, sp: 22 };
}

var charsEl = document.getElementById('chars');
var unlockBannerEl = document.getElementById('unlockBanner');
var purchaseEl = document.getElementById('purchase');
var pIcon = document.getElementById('pIcon');
var pTitle = document.getElementById('pTitle');
var pSub = document.getElementById('pSub');
var pPrice = document.getElementById('pPrice');
var pendingPurchase = null;

function renderChips() {
  charsEl.innerHTML = '';
  for (var i = 0; i < CHARACTERS.length; i++) {
    var ch = CHARACTERS[i];
    var unlocked = isUnlocked(ch);
    var chip = document.createElement('div');
    chip.className = 'chip' + (unlocked ? '' : ' locked') + (selectedChar === ch.id && unlocked ? ' selected' : '');
    var label = unlocked ? nameOf(ch.id).toUpperCase() : priceLabelFor(ch);
    var swimDelay = (i * 0.22).toFixed(2);
    chip.innerHTML = '<div class="chip-emoji" style="animation-delay:' + swimDelay + 's">' + ch.emoji + '</div>' +
      '<div class="lbl">' + label + '</div>' +
      (unlocked ? '' : '<div class="lock">🔒</div>');
    (function(id, ok, character) {
      chip.addEventListener('click', function() {
        if (ok) {
          selectedChar = id;
          try { localStorage.setItem(CHAR_KEY, id); } catch(e){}
          renderChips();
        } else {
          openPurchase(character);
        }
      });
    })(ch.id, unlocked, ch);
    charsEl.appendChild(chip);
  }
}

function openPurchase(c) {
  pendingPurchase = c;
  var localName = nameOf(c.id);
  pIcon.textContent = c.emoji;
  pTitle.textContent = t('unlock') + localName;
  pSub.textContent = t('addsPlayable', localName);
  pPrice.textContent = priceLabelFor(c);
  purchaseEl.classList.remove('hidden');
}
function closePurchase() {
  purchaseEl.classList.add('hidden');
  pendingPurchase = null;
}
function grantPurchase(charId) {
  var owned = getOwned();
  if (owned.indexOf(charId) === -1) owned.push(charId);
  saveOwned(owned);
  selectedChar = charId;
  try { localStorage.setItem(CHAR_KEY, charId); } catch(e){}
  renderChips();
  if (typeof checkAchievements === 'function') checkAchievements(bestScore);
}

document.getElementById('pBuy').addEventListener('click', function() {
  if (!pendingPurchase) return;
  var char = pendingPurchase;
  var IAP = getIAP();
  var buyBtn = document.getElementById('pBuy');

  // Dev/web fallback: no native plugin available — just record locally.
  // On a real device with the IAP plugin, this branch never runs.
  if (!isNativeIAP() || !char.productId) {
    grantPurchase(char.id);
    closePurchase();
    return;
  }

  buyBtn.disabled = true;
  var prevText = buyBtn.textContent;
  buyBtn.textContent = t('processing');

  Promise.resolve(IAP.purchase({ productId: char.productId })).then(function(res) {
    if (res && res.status === 'purchased') {
      grantPurchase(char.id);
      closePurchase();
      showToast(t('thanks', nameOf(char.id)));
    } else if (res && res.status === 'cancelled') {
      // user cancelled — nothing to do
    } else if (res && res.status === 'pending') {
      closePurchase();
      showToast(t('purchasePending'));
    } else {
      showToast(t('purchaseIncomplete'));
    }
  }).catch(function(e) {
    console.warn('IAP purchase failed:', e);
    showToast(t('purchaseFailed'));
  }).then(function() {
    buyBtn.disabled = false;
    buyBtn.textContent = prevText;
  });
});
document.getElementById('pCancel').addEventListener('click', closePurchase);

function showOverlay(t, s, btnText, newlyUnlocked, opts) {
  opts = opts || {};
  title.textContent = t; sub.textContent = s; btn.textContent = btnText;
  if (newlyUnlocked && newlyUnlocked.length) {
    unlockBannerEl.textContent = '🎉 Unlocked: ' + newlyUnlocked.map(function(c){return c.name;}).join(', ');
    unlockBannerEl.classList.remove('hidden');
  } else {
    unlockBannerEl.classList.add('hidden');
  }
  var card = document.getElementById('card');
  var hbtn = document.getElementById('homeBtn');
  if (opts.dead) {
    card.classList.add('dead');
    if (hbtn) hbtn.classList.remove('hidden');
  } else {
    card.classList.remove('dead');
    if (hbtn) hbtn.classList.add('hidden');
    renderChips();
    updateCardBest();
  }
  overlay.classList.remove('hidden');
  hud.classList.add('hidden'); bestEl.classList.add('hidden');
}
function updateCardBest() {
  var el = document.getElementById('cardBest');
  if (!el) return;
  if (bestScore > 0) {
    el.innerHTML = t('bestSep') + ' <strong>' + bestScore + '</strong>';
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}
function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.remove('hidden');
  // force reflow so transition runs
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(function() {
    t.classList.remove('show');
    setTimeout(function() { t.classList.add('hidden'); }, 250);
  }, 1800);
}
function hideOverlay() {
  overlay.classList.add('hidden');
  hud.classList.remove('hidden'); bestEl.classList.remove('hidden');
  var card = document.getElementById('card');
  if (card) card.classList.remove('dead');
  var hbtn = document.getElementById('homeBtn');
  if (hbtn) hbtn.classList.add('hidden');
}
// Death screen → Home: reset overlay to the menu state without restarting.
function goHome() {
  title.textContent = 'WSPuffer';
  sub.textContent = t('sub');
  btn.textContent = t('diveIn');
  var card = document.getElementById('card');
  if (card) card.classList.remove('dead');
  var hbtn = document.getElementById('homeBtn');
  if (hbtn) hbtn.classList.add('hidden');
  unlockBannerEl.classList.add('hidden');
  renderChips();
  updateCardBest();
}

function startGame() {
  fish.x = W * 0.28;
  fish.y = H * 0.5;
  fish.vy = 0;
  fish.baseR = Math.max(14, Math.min(W, H) * 0.025);
  fish.puff = 1;
  fish.wob = 0;
  corals = [];
  particles = [];
  score = 0;
  spawnTimer = 0.7;
  // Use the smaller dimension so the gap stays passable in landscape too
  gap = Math.max(160, Math.min(W, H) * 0.42);
  hud.textContent = '0';
  bestEl.textContent = bestScore ? 'BEST ' + bestScore : '';
  state = 'playing';
  bumpPlays();
  if (typeof checkAchievements === 'function') checkAchievements(0);
  initDecor();
  hideOverlay();
}

function flap() {
  fish.vy = -Math.max(7.5, H * 0.013);
  fish.puff = Math.min(2.4, fish.puff + 0.32);
  sndFlap();
  var burstX = fish.x - curRadius();
  for (var i = 0; i < 7; i++) {
    particles.push({ x: burstX, y: fish.y + rand(-8, 8),
      vx: rand(-70, -20), vy: rand(-40, 40), r: rand(2, 5), life: 0.7, age: 0 });
  }
}

function spawnCoral() {
  var margin = 70;
  var top = margin + Math.random() * (H - gap - margin * 2 - 80);
  var p = { x: W + 60, top: top, passed: false, seed: Math.random() * 100 };
  p.flowersTop = makeReefFlowers(0, top);
  p.flowersBot = makeReefFlowers(top + gap, H - 30);
  corals.push(p);
}

function makeReefFlowers(yStart, yEnd) {
  var flowers = [];
  var span = yEnd - yStart;
  if (span < 20) return flowers;
  var count = Math.max(3, Math.floor(span / 38));
  for (var i = 0; i < count; i++) {
    var t = (i + 0.15 + Math.random() * 0.7) / count;
    flowers.push({
      side: Math.random() < 0.5 ? -1 : 1,
      y: yStart + t * span,
      type: Math.floor(Math.random() * 3),  // 0 anemone, 1 polyps, 2 sea fan
      hue: 280 + Math.random() * 130,       // pinks → purples → corals
      size: 9 + Math.random() * 8,
      phase: Math.random() * Math.PI * 2
    });
  }
  return flowers;
}

function die() {
  state = 'dead';
  sndDie();
  for (var i = 0; i < 24; i++) {
    particles.push({ x: fish.x, y: fish.y, vx: rand(-120, 120), vy: rand(-120, 120), r: rand(2, 5), life: 0.9, age: 0 });
  }
  var prevBest = bestScore;
  var isNew = score > bestScore;
  if (isNew) {
    bestScore = score;
    try { localStorage.setItem(BEST_KEY, String(bestScore)); } catch(e){}
    if (typeof window.gcOnNewBest === 'function') window.gcOnNewBest(bestScore);
  }
  if (typeof checkAchievements === 'function') checkAchievements(score);
  var newlyUnlocked = [];
  setTimeout(function() {
    showOverlay(isNew && score > 0 ? t('newBest') : t('popped'),
      t('scoreSep') + ' ' + score + (bestScore ? '  ·  ' + t('bestSep') + ' ' + bestScore : ''),
      t('tryAgain'), newlyUnlocked, { dead: true });
  }, 600);
}

function curRadius() { return fish.baseR * fish.puff; }

function update(dt) {
  camT += dt;
  // shrink puff fast — deflate at the same rate puffing grows
  fish.puff = Math.max(1, fish.puff - dt * 2.0);
  fish.wob += dt * 6;

  // physics
  var gravity = Math.max(0.5, H * 0.0009) * dt * 60;
  fish.vy += gravity;
  fish.y += fish.vy * dt * 60;

  // Coral horizontal speed scales with screen width so the play feels
  // consistent across portrait and landscape.
  var pw = Math.max(56, Math.min(W, H) * 0.16);
  var sp = Math.max(2.6, W * 0.0050) + Math.min(3.5, score * 0.05);

  // Spawn corals on a distance basis so density is stable regardless of
  // aspect: target ~1.5 corals visible at any time.
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCoral();
    var spPerSec = sp * 60;
    var targetGapPx = W / 1.5;
    spawnTimer = Math.max(0.8, targetGapPx / spPerSec);
  }
  for (var i = 0; i < corals.length; i++) {
    var p = corals[i];
    p.x -= sp;
    if (!p.passed && p.x + pw < fish.x) {
      p.passed = true;
      score++;
      hud.textContent = String(score);
      sndScore();
      for (var b = 0; b < 6; b++) {
        particles.push({ x: fish.x, y: fish.y, vx: rand(-60, 60), vy: rand(-80, -20), r: rand(1.5, 3), life: 0.5, age: 0, gold: true });
      }
    }
    var r = curRadius();
    var hitX = (fish.x + r * 0.85 > p.x) && (fish.x - r * 0.85 < p.x + pw);
    if (hitX && (fish.y - r * 0.85 < p.top || fish.y + r * 0.85 > p.top + gap)) {
      die(); return;
    }
  }
  while (corals.length && corals[0].x < -120) corals.shift();

  // ceiling / floor
  var r = curRadius();
  if (fish.y + r > H - 30 || fish.y - r < 0) { die(); return; }

  // particles
  for (var pi = particles.length - 1; pi >= 0; pi--) {
    var pa = particles[pi];
    pa.age += dt;
    pa.x += pa.vx * dt;
    pa.y += pa.vy * dt;
    pa.vy += 60 * dt;
    if (pa.age > pa.life) particles.splice(pi, 1);
  }

  // decor
  for (var bi = 0; bi < bubbles.length; bi++) {
    var bb = bubbles[bi];
    bb.y -= bb.sp * dt;
    bb.x += Math.sin(camT * 2 + bb.wob) * 8 * dt;
    if (bb.y < -10) { bb.y = H + 10; bb.x = rand(0, W); }
  }
  for (var ji = 0; ji < jellies.length; ji++) {
    var jl = jellies[ji];
    jl.x += jl.sp * dt;
    jl.y += Math.sin(camT * 1.2 + jl.bob) * 10 * dt;
    if (jl.sp > 0 && jl.x > W + 80) { jl.x = -80; jl.y = rand(H * 0.15, H * 0.7); }
    if (jl.sp < 0 && jl.x < -80) { jl.x = W + 80; jl.y = rand(H * 0.15, H * 0.7); }
  }
  for (var si = 0; si < schools.length; si++) {
    var sc = schools[si];
    sc.x += sc.sp * dt;
    if (sc.sp > 0 && sc.x > W + 200) { sc.x = -200; sc.y = rand(H * 0.2, H * 0.8); }
    if (sc.sp < 0 && sc.x < -200) { sc.x = W + 200; sc.y = rand(H * 0.2, H * 0.8); }
  }
  // turtles
  for (var ti = 0; ti < turtles.length; ti++) {
    var tu = turtles[ti];
    tu.x += tu.sp * tu.dir * dt;
    tu.y += Math.sin(camT * 0.6 + tu.ph) * 4 * dt;
    tu.ph += dt * 2;
    if (tu.dir > 0 && tu.x > W + 120) { tu.x = -120; tu.y = rand(H * 0.25, H * 0.65); }
    if (tu.dir < 0 && tu.x < -120) { tu.x = W + 120; tu.y = rand(H * 0.25, H * 0.65); }
  }
  // seahorses bob in place but drift slowly
  for (var sh = 0; sh < seahorses.length; sh++) {
    var sx = seahorses[sh];
    sx.x -= sx.sp * dt;
    sx.y += Math.sin(camT * 1.4 + sx.ph) * 14 * dt;
    sx.ph += dt * 3;
    if (sx.x < -40) { sx.x = W + 40; sx.y = rand(H * 0.3, H * 0.75); }
  }
  // crabs scuttle along the floor
  for (var cr = 0; cr < crabs.length; cr++) {
    var cb = crabs[cr];
    cb.x += cb.sp * cb.dir * dt;
    cb.wob += dt * 12;
    if (cb.dir > 0 && cb.x > W + 30) { cb.dir = -1; cb.x = W + 20; }
    if (cb.dir < 0 && cb.x < -30) { cb.dir = 1; cb.x = -20; }
  }
  // scuba diver
  if (diver) {
    diver.x += diver.sp * dt;
    diver.y += Math.sin(camT * 0.7 + diver.ph) * 8 * dt;
    diver.kick += dt * 4;
    diver.bubbleTimer -= dt;
    if (diver.bubbleTimer <= 0) {
      diver.bubbleTimer = 0.25;
      for (var db = 0; db < 3; db++) {
        bubbles.push({ x: diver.x + 18, y: diver.y - 18 + rand(-3, 3), r: rand(2, 5), sp: rand(30, 55), wob: rand(0, Math.PI * 2) });
      }
    }
    if (diver.x > W + 150) {
      diver.x = -150;
      diver.y = rand(H * 0.25, H * 0.6);
      diver.sp = rand(15, 30);
    }
  }

  shake *= Math.pow(0.001, dt);
}

function drawBg() {
  // matches wspuffer.com body gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#021522');
  g.addColorStop(0.45, '#062a3a');
  g.addColorStop(1, '#0c4660');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // soft top halo to match the website's radial layer
  var halo = ctx.createRadialGradient(W * 0.5, -H * 0.15, H * 0.1, W * 0.5, -H * 0.15, H * 0.9);
  halo.addColorStop(0, 'rgba(40,110,150,0.35)');
  halo.addColorStop(1, 'rgba(40,110,150,0)');
  ctx.fillStyle = halo; ctx.fillRect(0, 0, W, H);

  // sun rays from top
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#ffffff';
  for (var i = 0; i < 5; i++) {
    var x = (i + 1) * (W / 6);
    ctx.beginPath();
    ctx.moveTo(x - 40, 0);
    ctx.lineTo(x + 40, 0);
    ctx.lineTo(x + 120, H);
    ctx.lineTo(x - 120, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawJelly(j) {
  ctx.save();
  ctx.translate(j.x, j.y);
  var pulse = 1 + Math.sin(camT * 1.6 + j.ph) * 0.06;
  var r = j.r * pulse;
  var hue = j.hue;

  // outer glow
  var glow = ctx.createRadialGradient(0, 0, r * 0.4, 0, 0, r * 3);
  glow.addColorStop(0, 'hsla(' + hue + ', 90%, 75%, 0.35)');
  glow.addColorStop(0.5, 'hsla(' + hue + ', 90%, 60%, 0.12)');
  glow.addColorStop(1, 'hsla(' + hue + ', 90%, 60%, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0, 0, r * 3, 0, Math.PI * 2); ctx.fill();

  // long flowing tentacles (drawn first so bell sits on top)
  var tentacleCount = 8;
  for (var ti = 0; ti < tentacleCount; ti++) {
    var t01 = ti / (tentacleCount - 1);
    var sx = (t01 - 0.5) * r * 1.5;
    var len = r * (2.4 + Math.sin(ti * 1.3) * 0.6);
    ctx.beginPath();
    ctx.moveTo(sx, r * 0.35);
    var segs = 14;
    for (var s = 1; s <= segs; s++) {
      var sy = r * 0.35 + (s / segs) * len;
      var wave = Math.sin(camT * 2 + ti * 0.7 + s * 0.5) * (s / segs) * 8;
      ctx.lineTo(sx + wave, sy);
    }
    var grad = ctx.createLinearGradient(0, r * 0.35, 0, r * 0.35 + len);
    grad.addColorStop(0, 'hsla(' + hue + ', 90%, 78%, 0.85)');
    grad.addColorStop(1, 'hsla(' + hue + ', 90%, 78%, 0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // shorter frilly oral arms (thicker, ribbon-like)
  ctx.fillStyle = 'hsla(' + hue + ', 85%, 80%, 0.55)';
  for (var fi = 0; fi < 4; fi++) {
    var fx = (fi - 1.5) * r * 0.35;
    ctx.beginPath();
    ctx.moveTo(fx - 4, r * 0.3);
    var ribL = r * 1.4;
    for (var rs = 0; rs <= 10; rs++) {
      var yy = r * 0.3 + (rs / 10) * ribL;
      var ww = Math.sin(camT * 2 + fi + rs * 0.4) * 5 + 6 * (1 - rs / 10);
      ctx.lineTo(fx + ww, yy);
    }
    for (var rs2 = 10; rs2 >= 0; rs2--) {
      var yy2 = r * 0.3 + (rs2 / 10) * ribL;
      var ww2 = Math.sin(camT * 2 + fi + rs2 * 0.4) * 5 - 6 * (1 - rs2 / 10);
      ctx.lineTo(fx + ww2, yy2);
    }
    ctx.closePath();
    ctx.fill();
  }

  // bell — translucent dome with internal gradient
  var bell = ctx.createRadialGradient(-r * 0.25, -r * 0.4, r * 0.1, 0, 0, r * 1.1);
  bell.addColorStop(0, 'hsla(' + hue + ', 100%, 92%, 0.95)');
  bell.addColorStop(0.55, 'hsla(' + hue + ', 85%, 72%, 0.75)');
  bell.addColorStop(1, 'hsla(' + hue + ', 75%, 55%, 0.55)');
  ctx.fillStyle = bell;
  ctx.beginPath();
  ctx.moveTo(-r, r * 0.25);
  ctx.quadraticCurveTo(-r * 1.05, -r * 1.1, 0, -r * 1.05);
  ctx.quadraticCurveTo(r * 1.05, -r * 1.1, r, r * 0.25);
  // scalloped skirt edge
  var scallops = 7;
  for (var sc = scallops; sc >= 0; sc--) {
    var sx2 = r - (sc / scallops) * r * 2;
    var sy2 = r * 0.25 + Math.sin(camT * 2 + sc) * 3 + 4;
    var dip = sc % 2 === 0 ? r * 0.18 : r * 0.08;
    ctx.quadraticCurveTo(sx2 + r / scallops, r * 0.25 + dip, sx2, sy2);
  }
  ctx.closePath();
  ctx.fill();

  // inner organs (gonads) — soft loops inside the bell
  ctx.fillStyle = 'hsla(' + hue + ', 90%, 85%, 0.55)';
  for (var oi = 0; oi < 4; oi++) {
    var ox = (oi - 1.5) * r * 0.25;
    ctx.beginPath();
    ctx.ellipse(ox, -r * 0.15, r * 0.08, r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.3, -r * 0.65, r * 0.3, r * 0.1, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSchool(s) {
  ctx.save();
  ctx.fillStyle = '#a8e5ff';
  var facing = s.sp >= 0 ? 1 : -1;
  for (var i = 0; i < s.count; i++) {
    var fx = s.x + i * 18 * facing;
    var fy = s.y + Math.sin(camT * 4 + i + s.ph) * 6;
    ctx.beginPath();
    ctx.ellipse(fx, fy, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(fx - 6 * facing, fy);
    ctx.lineTo(fx - 10 * facing, fy - 3);
    ctx.lineTo(fx - 10 * facing, fy + 3);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawTurtle(t) {
  ctx.save();
  ctx.translate(t.x, t.y);
  if (t.dir < 0) ctx.scale(-1, 1);
  var flap = Math.sin(t.ph) * 0.35;

  // back flippers
  ctx.fillStyle = '#3d6b48';
  ctx.beginPath();
  ctx.ellipse(-26, -10, 14, 6, -0.4 + flap * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-26, 10, 14, 6, 0.4 - flap * 0.3, 0, Math.PI * 2); ctx.fill();

  // shell
  var shellGrad = ctx.createRadialGradient(-4, -6, 4, 0, 0, 26);
  shellGrad.addColorStop(0, '#7ab98a');
  shellGrad.addColorStop(0.6, '#3d8050');
  shellGrad.addColorStop(1, '#1f4a2c');
  ctx.fillStyle = shellGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 26, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  // shell hex pattern
  ctx.strokeStyle = '#1f4a2c';
  ctx.lineWidth = 1.5;
  for (var hx = -2; hx <= 2; hx++) {
    for (var hy = -1; hy <= 1; hy++) {
      ctx.beginPath();
      var cx = hx * 9, cy = hy * 9 + (hx % 2 ? 4 : 0);
      if (cx*cx*0.6 + cy*cy < 220) {
        for (var k = 0; k < 6; k++) {
          var a = k * Math.PI / 3;
          var px = cx + Math.cos(a) * 5;
          var py = cy + Math.sin(a) * 5;
          if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  }

  // front flippers (bigger)
  ctx.fillStyle = '#4d7d5a';
  ctx.beginPath();
  ctx.ellipse(14, -14, 18, 7, 0.4 + flap, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(14, 14, 18, 7, -0.4 - flap, 0, Math.PI * 2); ctx.fill();

  // head
  ctx.fillStyle = '#4d7d5a';
  ctx.beginPath(); ctx.ellipse(24, 0, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
  // eye
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(28, -2, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a1424';
  ctx.beginPath(); ctx.arc(29, -2, 1.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawSeahorse(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  var sway = Math.sin(s.ph) * 0.15;
  ctx.rotate(sway);
  ctx.fillStyle = '#e0b04a';
  // curled body — S shape
  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.bezierCurveTo(-10, -10, 10, 0, -2, 12);
  ctx.bezierCurveTo(-14, 22, 6, 26, 10, 14);
  ctx.lineTo(14, 16);
  ctx.bezierCurveTo(10, 30, -20, 26, -8, 10);
  ctx.bezierCurveTo(4, -2, -16, -10, -6, -22);
  ctx.closePath();
  ctx.fill();
  // head bump
  ctx.beginPath();
  ctx.ellipse(2, -24, 6, 5, -0.3, 0, Math.PI * 2); ctx.fill();
  // snout
  ctx.fillRect(4, -26, 8, 3);
  // crown spikes
  ctx.beginPath();
  ctx.moveTo(-3, -28); ctx.lineTo(-1, -32); ctx.lineTo(1, -28);
  ctx.moveTo(1, -28); ctx.lineTo(3, -32); ctx.lineTo(5, -28);
  ctx.fill();
  // dorsal fin
  ctx.fillStyle = 'rgba(255, 220, 140, 0.7)';
  ctx.beginPath();
  ctx.ellipse(-8, -4, 5, 9, 0.3, 0, Math.PI * 2); ctx.fill();
  // eye
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(4, -22, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a1424';
  ctx.beginPath(); ctx.arc(5, -22, 1.1, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawStarfish(s) {
  ctx.save();
  ctx.translate(s.x, H - 12);
  ctx.rotate(s.rot);
  var c = 'hsl(' + s.hue + ', 80%, 60%)';
  var c2 = 'hsl(' + s.hue + ', 80%, 45%)';
  ctx.fillStyle = c;
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    var rr = i % 2 === 0 ? s.size : s.size * 0.45;
    var px = Math.cos(a) * rr;
    var py = Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = c2;
  for (var d = 0; d < 5; d++) {
    var a2 = (d / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(Math.cos(a2) * s.size * 0.5, Math.sin(a2) * s.size * 0.5, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawCrab(c) {
  ctx.save();
  ctx.translate(c.x, H - 10);
  var hop = Math.abs(Math.sin(c.wob)) * 2;
  ctx.translate(0, -hop);
  // legs
  ctx.strokeStyle = '#a0341e';
  ctx.lineWidth = 2;
  for (var li = -2; li <= 2; li++) {
    if (li === 0) continue;
    var lx = li * 4;
    var ly = 6;
    var legSwing = Math.sin(c.wob + li) * 3;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx + legSwing, ly);
    ctx.stroke();
  }
  // body
  ctx.fillStyle = '#d04425';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 7, 0, 0, Math.PI * 2); ctx.fill();
  // claws
  ctx.beginPath(); ctx.ellipse(-14, -2, 5, 4, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14, -2, 5, 4, 0.3, 0, Math.PI * 2); ctx.fill();
  // eyes on stalks
  ctx.strokeStyle = '#d04425'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-4, -5); ctx.lineTo(-4, -10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, -5); ctx.lineTo(4, -10); ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-4, -11, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -11, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a1424';
  ctx.beginPath(); ctx.arc(-4, -11, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -11, 1, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawDiver(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  var kick = Math.sin(d.kick) * 0.5;
  var armSway = Math.sin(d.kick * 0.5) * 0.08;

  // --- Oxygen tank on back ---
  var tankGrad = ctx.createLinearGradient(-22, 0, -14, 0);
  tankGrad.addColorStop(0, '#7a8090');
  tankGrad.addColorStop(0.5, '#e2e6ee');
  tankGrad.addColorStop(1, '#8a909c');
  ctx.fillStyle = tankGrad;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(-22, -8, 8, 22, 2) : ctx.rect(-22, -8, 8, 22);
  ctx.fill();
  // tank valve
  ctx.fillStyle = '#3a3d44';
  ctx.fillRect(-21, -11, 6, 3);
  ctx.fillStyle = '#1a1c20';
  ctx.fillRect(-19.5, -13, 3, 3);
  // straps
  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(-19, -6, 2, 20);
  ctx.fillRect(-22, 7, 8, 2);

  // --- Legs (back-most so they read behind body when kicking up) ---
  ctx.fillStyle = '#0f2a44';
  ctx.beginPath();
  ctx.ellipse(-16, -2 + kick * 4, 11, 4.5, 0.3 + kick * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-16, 10 - kick * 4, 11, 4.5, -0.3 - kick * 0.3, 0, Math.PI * 2); ctx.fill();
  // knee highlight
  ctx.fillStyle = '#1d4571';
  ctx.beginPath();
  ctx.ellipse(-18, -2 + kick * 4, 3, 2, 0.3 + kick * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-18, 10 - kick * 4, 3, 2, -0.3 - kick * 0.3, 0, Math.PI * 2); ctx.fill();

  // --- Fins (long, tapered, ribbed) ---
  function drawFin(y, sign) {
    var fx = -28, fy = y + sign * kick * 6;
    var ang = sign * 0.25 + sign * kick * 0.4;
    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(ang);
    var fGrad = ctx.createLinearGradient(-12, 0, 6, 0);
    fGrad.addColorStop(0, '#0a0a0d');
    fGrad.addColorStop(0.7, '#2a2a30');
    fGrad.addColorStop(1, '#4a4a52');
    ctx.fillStyle = fGrad;
    ctx.beginPath();
    ctx.moveTo(6, -2);
    ctx.lineTo(-14, -6);
    ctx.lineTo(-14, 6);
    ctx.lineTo(6, 2);
    ctx.closePath();
    ctx.fill();
    // ribs
    ctx.strokeStyle = '#0a0a0d'; ctx.lineWidth = 0.8;
    for (var r = -10; r <= 2; r += 4) {
      ctx.beginPath();
      ctx.moveTo(r, -5); ctx.lineTo(r, 5);
      ctx.stroke();
    }
    ctx.restore();
  }
  drawFin(-3, 1);
  drawFin(11, -1);

  // --- Body (wetsuit) with radial gradient ---
  var bodyGrad = ctx.createRadialGradient(-4, -2, 2, -4, 4, 16);
  bodyGrad.addColorStop(0, '#2a567f');
  bodyGrad.addColorStop(1, '#0d2a44');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(-4, 4, 14, 11, 0, 0, Math.PI * 2); ctx.fill();
  // accent stripe (matches brand orange)
  ctx.strokeStyle = '#ffb84d';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.ellipse(-4, 4, 11, 8.5, 0, -0.4, 0.7);
  ctx.stroke();
  // weight belt
  ctx.fillStyle = '#141418';
  ctx.fillRect(-14, 11, 18, 2.5);
  ctx.fillStyle = '#9a9aa4';
  ctx.fillRect(-6, 11, 3, 2.5);

  // --- Arms forward (slight sway) ---
  ctx.fillStyle = '#13314f';
  ctx.beginPath();
  ctx.ellipse(10, 0 + armSway * 2, 10, 4, 0.2 + armSway, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, 8 - armSway * 2, 10, 4, -0.2 - armSway, 0, Math.PI * 2); ctx.fill();
  // gloves
  ctx.fillStyle = '#0a0a0d';
  ctx.beginPath();
  ctx.arc(19, 0 + armSway * 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(19, 8 - armSway * 2, 3, 0, Math.PI * 2); ctx.fill();

  // --- Air hose (curving with highlight) ---
  ctx.strokeStyle = '#1a1a1f'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(15, -3);
  ctx.bezierCurveTo(2, -2, -12, -12, -18, -8);
  ctx.stroke();
  ctx.strokeStyle = '#3d3d44'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(15, -3.6);
  ctx.bezierCurveTo(2, -2.6, -12, -12.6, -18, -8.6);
  ctx.stroke();

  // --- Head with hood and shading ---
  // hood (behind face)
  ctx.fillStyle = '#0a1828';
  ctx.beginPath();
  ctx.arc(9, -9, 8, 0, Math.PI * 2); ctx.fill();
  // face
  ctx.fillStyle = '#f1c99a';
  ctx.beginPath();
  ctx.arc(11, -8, 6.5, 0, Math.PI * 2); ctx.fill();
  // jaw shadow
  ctx.fillStyle = '#d6a982';
  ctx.beginPath();
  ctx.arc(11, -6, 5.5, 0, Math.PI); ctx.fill();

  // --- Mask ---
  // frame
  ctx.fillStyle = '#1a1a1f';
  ctx.beginPath();
  ctx.ellipse(13, -9, 6, 4.6, 0, 0, Math.PI * 2); ctx.fill();
  // glass with reflection gradient
  var glassGrad = ctx.createLinearGradient(8, -11, 18, -7);
  glassGrad.addColorStop(0, '#cdeefe');
  glassGrad.addColorStop(0.5, '#5fb8df');
  glassGrad.addColorStop(1, '#2d6f8c');
  ctx.fillStyle = glassGrad;
  ctx.beginPath();
  ctx.ellipse(13, -9, 5, 3.7, 0, 0, Math.PI * 2); ctx.fill();
  // glint highlights
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.beginPath();
  ctx.ellipse(11, -10.5, 1.6, 0.7, -0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(14, -8, 0.7, 0.4, 0, 0, Math.PI * 2); ctx.fill();
  // strap
  ctx.strokeStyle = '#1a1a1f'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(7, -9.5); ctx.lineTo(2, -10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7, -7.5); ctx.lineTo(2, -7); ctx.stroke();

  // --- Regulator/mouthpiece ---
  ctx.fillStyle = '#1a1a1f';
  ctx.fillRect(13, -5, 4, 3.5);
  ctx.fillStyle = '#444';
  ctx.fillRect(13, -4.5, 1.5, 2.5);
  // tiny exhaust bubble
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.beginPath();
  ctx.arc(19, -5, 1.1, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawSeaweed() {
  for (var i = 0; i < seaweed.length; i++) {
    var w = seaweed[i];
    ctx.strokeStyle = 'hsla(' + w.hue + ', 60%, 35%, 0.85)';
    ctx.lineWidth = 8; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w.x, H);
    for (var y = 0; y <= w.h; y += 8) {
      var sw = Math.sin(camT * 1.6 + w.ph + y * 0.12) * (y / w.h) * 14;
      ctx.lineTo(w.x + sw, H - y);
    }
    ctx.stroke();
  }
}

function drawBubbles() {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (var i = 0; i < bubbles.length; i++) {
    var bb = bubbles[i];
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, bb.r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

function drawCoral(p) {
  var pw = 72;
  drawReefPillar(p, p.x, 0, pw, p.top, true,  p.flowersTop || []);
  drawReefPillar(p, p.x, p.top + gap, pw, H - (p.top + gap), false, p.flowersBot || []);
}

function drawReefPillar(p, x, y, w, h, isTop, flowers) {
  // jagged silhouette clip
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x, y);
  var step = 10;
  for (var yy = y; yy <= y + h; yy += step) {
    var bump = Math.sin((yy + p.seed) * 0.22) * 4 + Math.sin((yy + p.seed) * 0.71) * 2;
    ctx.lineTo(x + bump, yy);
  }
  ctx.lineTo(x, y + h);
  ctx.lineTo(x + w, y + h);
  for (var yy2 = y + h; yy2 >= y; yy2 -= step) {
    var bump2 = Math.sin((yy2 + p.seed + 19) * 0.24) * 4 + Math.cos((yy2 + p.seed) * 0.6) * 2.5;
    ctx.lineTo(x + w + bump2, yy2);
  }
  ctx.closePath();
  ctx.clip();

  // base rock gradient
  var g = ctx.createLinearGradient(x, 0, x + w, 0);
  g.addColorStop(0, '#5b2a55');
  g.addColorStop(0.5, '#8a3a78');
  g.addColorStop(1, '#42204a');
  ctx.fillStyle = g;
  ctx.fillRect(x - 6, y, w + 12, h);

  // mossy speckles
  ctx.fillStyle = 'rgba(255,180,210,0.18)';
  for (var sp = 0; sp < 22; sp++) {
    var sy = y + ((sp * 37 + p.seed * 13) % h);
    var sx = x + ((sp * 11 + p.seed * 7) % w);
    ctx.beginPath(); ctx.arc(sx, sy, 1.8, 0, Math.PI * 2); ctx.fill();
  }
  // teal/algae streaks
  ctx.fillStyle = 'rgba(127,193,201,0.22)';
  for (var sk = 0; sk < 10; sk++) {
    var ky = y + ((sk * 71 + p.seed * 17) % Math.max(8, h - 8));
    ctx.fillRect(x + 6 + ((sk * 9) % (w - 12)), ky, 9, 4);
  }
  ctx.restore();

  // cap stripe (teal lip at the gap opening)
  var capY = isTop ? y + h - 7 : y;
  ctx.fillStyle = '#7fc1c9';
  ctx.fillRect(x - 5, capY, w + 10, 7);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fillRect(x - 5, capY, w + 10, 2);

  // flowers
  for (var i = 0; i < flowers.length; i++) {
    var f = flowers[i];
    var fx = f.side > 0 ? x + w : x;
    drawReefFlower(fx, f.y, f.side, f.type, f.size, f.hue, camT, f.phase);
  }
}

function drawReefFlower(x, y, side, type, size, hue, t, phase) {
  var sway = Math.sin(t * 2.2 + phase) * 2;
  ctx.save();
  ctx.translate(x + side * sway, y);
  ctx.scale(side, 1);
  if (type === 0) {
    // anemone — tendril cluster
    ctx.strokeStyle = 'hsl(' + hue + ',85%,72%)';
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    var tend = 10;
    for (var i = 0; i < tend; i++) {
      var a = -Math.PI * 0.55 + (i / (tend - 1)) * Math.PI * 1.1;
      var len = size * (0.9 + Math.sin(i + t * 2) * 0.12);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(Math.cos(a) * len * 0.6 + sway * 0.5,
                           Math.sin(a) * len * 0.6,
                           Math.cos(a) * len, Math.sin(a) * len);
      ctx.stroke();
    }
    ctx.fillStyle = 'hsl(' + hue + ',90%,55%)';
    ctx.beginPath(); ctx.arc(0, 0, size * 0.42, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'hsl(' + hue + ',95%,80%)';
    ctx.beginPath(); ctx.arc(-size * 0.14, -size * 0.14, size * 0.18, 0, Math.PI * 2); ctx.fill();
  } else if (type === 1) {
    // polyp cluster
    ctx.fillStyle = 'hsl(' + (hue - 20) + ',70%,38%)';
    ctx.beginPath();
    for (var k = 0; k < 6; k++) {
      var ang = k * (Math.PI * 2 / 6);
      ctx.moveTo(Math.cos(ang) * size, Math.sin(ang) * size);
      ctx.arc(Math.cos(ang) * size * 0.5, Math.sin(ang) * size * 0.5, size * 0.55, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.fillStyle = 'hsl(' + hue + ',95%,72%)';
    for (var pp = 0; pp < 9; pp++) {
      var pa = pp * 1.3;
      ctx.beginPath();
      ctx.arc(Math.cos(pa) * size * 0.35, Math.sin(pa) * size * 0.35, size * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // sea fan — branched
    ctx.strokeStyle = 'hsl(' + hue + ',75%,58%)';
    ctx.lineWidth = 2.4;
    ctx.lineCap = 'round';
    for (var b = 0; b < 6; b++) {
      var ba = -Math.PI * 0.55 + (b / 5) * Math.PI * 1.1;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(Math.cos(ba) * size * 0.35,
                           Math.sin(ba) * size * 0.35 - size * 0.2,
                           Math.cos(ba) * size, Math.sin(ba) * size);
      ctx.stroke();
    }
    ctx.fillStyle = 'hsl(' + hue + ',85%,68%)';
    for (var d = 0; d < 6; d++) {
      var da = -Math.PI * 0.55 + (d / 5) * Math.PI * 1.1;
      ctx.beginPath();
      ctx.arc(Math.cos(da) * size, Math.sin(da) * size, size * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawPuffMeter() {
  var r = curRadius();
  var puffT = (fish.puff - 1) / 1.4;
  if (puffT < 0.01) return;
  var ringR = r + 10;
  ctx.save();
  ctx.translate(fish.x, fish.y);
  ctx.lineWidth = 3;
  // background ring
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.arc(0, 0, ringR, 0, Math.PI * 2); ctx.stroke();
  // filled arc
  var col = puffT > 0.7 ? '#ff5a5a' : (puffT > 0.4 ? '#ffb84d' : '#ffd58a');
  ctx.strokeStyle = col;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, ringR, -Math.PI / 2, -Math.PI / 2 + puffT * Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawCharacter() {
  if (selectedChar === 'clownfish') return drawClownfish();
  if (selectedChar === 'swordfish') return drawSwordfish();
  if (selectedChar === 'shark')     return drawShark();
  drawFish();
}

function withFishTransform(fn) {
  var r = curRadius();
  ctx.save();
  ctx.translate(fish.x, fish.y);
  var tilt = Math.max(-0.45, Math.min(0.9, fish.vy * 0.045));
  ctx.rotate(tilt);
  fn(r, (fish.puff - 1) / 1.4);
  ctx.restore();
}

function drawClownfish() {
  withFishTransform(function(r, puffT) {
    var s = 1 + puffT * 0.4;
    // tail
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.moveTo(-r * s, 0);
    ctx.lineTo(-r * 1.7 * s, -r * 0.7);
    ctx.lineTo(-r * 1.4 * s, 0);
    ctx.lineTo(-r * 1.7 * s, r * 0.7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff7a1f';
    ctx.beginPath();
    ctx.moveTo(-r * 0.95 * s, -r * 0.1);
    ctx.lineTo(-r * 1.55 * s, -r * 0.55);
    ctx.lineTo(-r * 1.55 * s, r * 0.55);
    ctx.lineTo(-r * 0.95 * s, r * 0.1);
    ctx.closePath(); ctx.fill();
    // body — oval
    var grad = ctx.createLinearGradient(0, -r * s, 0, r * s);
    grad.addColorStop(0, '#ffa44d');
    grad.addColorStop(0.5, '#ff7a1f');
    grad.addColorStop(1, '#c44e0e');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.15 * s, r * 0.85 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // white stripes
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(-r * 0.2 * s, 0, r * 0.18 * s, r * 0.8 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r * 0.4 * s, 0, r * 0.18 * s, r * 0.7 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // black stripe outlines
    ctx.strokeStyle = 'rgba(20,20,20,0.6)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(-r * 0.2 * s, 0, r * 0.18 * s, r * 0.8 * s, 0, 0, Math.PI * 2);
    ctx.stroke();
    // fin top
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.moveTo(-r * 0.3 * s, -r * 0.7 * s);
    ctx.lineTo(0, -r * 1.1 * s);
    ctx.lineTo(r * 0.2 * s, -r * 0.7 * s);
    ctx.closePath(); ctx.fill();
    // eye
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(r * 0.65 * s, -r * 0.15 * s, r * 0.18 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1424';
    ctx.beginPath(); ctx.arc(r * 0.7 * s, -r * 0.13 * s, r * 0.1 * s, 0, Math.PI * 2); ctx.fill();
  });
}

function drawAngelfish() {
  withFishTransform(function(r, puffT) {
    var s = 1 + puffT * 0.45;
    // tall diamond body
    var bw = r * 1.1 * s, bh = r * 1.6 * s;
    var grad = ctx.createLinearGradient(0, -bh, 0, bh);
    grad.addColorStop(0, '#fff7c8');
    grad.addColorStop(0.5, '#ffd24d');
    grad.addColorStop(1, '#b07b15');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(bw, 0);
    ctx.lineTo(0, -bh);
    ctx.lineTo(-bw, 0);
    ctx.lineTo(0, bh);
    ctx.closePath(); ctx.fill();
    // vertical stripes
    ctx.fillStyle = 'rgba(70,40,10,0.45)';
    for (var i = -1; i <= 1; i++) {
      var sx = i * r * 0.35 * s;
      ctx.fillRect(sx - 2, -bh * 0.7, 4, bh * 1.4);
    }
    // top + bottom long fins
    ctx.fillStyle = 'rgba(255, 220, 120, 0.8)';
    ctx.beginPath();
    ctx.moveTo(-r * 0.2 * s, -bh * 0.9);
    ctx.lineTo(-r * 0.5 * s, -bh * 1.5);
    ctx.lineTo(r * 0.1 * s, -bh * 0.85);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-r * 0.2 * s, bh * 0.9);
    ctx.lineTo(-r * 0.5 * s, bh * 1.5);
    ctx.lineTo(r * 0.1 * s, bh * 0.85);
    ctx.closePath(); ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(-bw * 0.9, -r * 0.3);
    ctx.lineTo(-bw * 1.6, -r * 0.6);
    ctx.lineTo(-bw * 1.5, 0);
    ctx.lineTo(-bw * 1.6, r * 0.6);
    ctx.lineTo(-bw * 0.9, r * 0.3);
    ctx.closePath(); ctx.fill();
    // eye
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(r * 0.55 * s, -r * 0.15 * s, r * 0.18 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1424';
    ctx.beginPath(); ctx.arc(r * 0.6 * s, -r * 0.13 * s, r * 0.1 * s, 0, Math.PI * 2); ctx.fill();
  });
}

function drawOctopus() {
  withFishTransform(function(r, puffT) {
    var s = 1 + puffT * 0.4;
    // tentacles fan out, longer when puffed
    var tcount = 8;
    var spread = 0.6 + puffT * 0.4;
    ctx.fillStyle = '#8a3aa3';
    for (var i = 0; i < tcount; i++) {
      var ang = -Math.PI / 2 + (i / (tcount - 1) - 0.5) * Math.PI * spread;
      var len = r * (1.4 + puffT * 0.6) * s;
      ctx.beginPath();
      ctx.moveTo(0, r * 0.2);
      var cx = Math.cos(ang) * len * 0.6;
      var cy = Math.sin(ang) * len * 0.6 + r * 0.5;
      var ex = Math.cos(ang) * len;
      var ey = Math.sin(ang) * len + r * 0.2;
      ctx.quadraticCurveTo(cx, cy, ex, ey);
      ctx.lineTo(ex + Math.cos(ang + 1.4) * 4, ey + Math.sin(ang + 1.4) * 4);
      ctx.quadraticCurveTo(cx + 5, cy + 5, 5, r * 0.2);
      ctx.closePath();
      ctx.fill();
    }
    // suction cups (decorative)
    ctx.fillStyle = '#d99cee';
    for (var t = 0; t < tcount; t++) {
      var ang2 = -Math.PI / 2 + (t / (tcount - 1) - 0.5) * Math.PI * spread;
      for (var c = 1; c <= 3; c++) {
        var px = Math.cos(ang2) * (r * 0.5 * c) * s;
        var py = Math.sin(ang2) * (r * 0.5 * c) * s + r * 0.3;
        ctx.beginPath(); ctx.arc(px, py, 1.8, 0, Math.PI * 2); ctx.fill();
      }
    }
    // bulbous head
    var grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.2, 0, 0, r * s);
    grad.addColorStop(0, '#d49ce6');
    grad.addColorStop(0.6, '#9a4cb5');
    grad.addColorStop(1, '#5d2675');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.1, r * 1.1 * s, r * 0.95 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // top sheen
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.ellipse(-r * 0.3 * s, -r * 0.55 * s, r * 0.35 * s, r * 0.1 * s, -0.3, 0, Math.PI * 2); ctx.fill();
    // eyes
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(-r * 0.3 * s, -r * 0.15 * s, r * 0.18 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.3 * s, -r * 0.15 * s, r * 0.18 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1424';
    ctx.beginPath(); ctx.arc(-r * 0.27 * s, -r * 0.12 * s, r * 0.09 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.33 * s, -r * 0.12 * s, r * 0.09 * s, 0, Math.PI * 2); ctx.fill();
  });
}

function drawSwordfish() {
  withFishTransform(function(r, puffT) {
    var s = 1 + puffT * 0.35;
    // body — long sleek ellipse
    var grad = ctx.createLinearGradient(0, -r * s, 0, r * s);
    grad.addColorStop(0, '#90b5d8');
    grad.addColorStop(0.5, '#3a6f9c');
    grad.addColorStop(1, '#1a3f63');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.5 * s, r * 0.6 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // belly
    ctx.fillStyle = 'rgba(220, 235, 255, 0.65)';
    ctx.beginPath();
    ctx.ellipse(0, r * 0.2, r * 1.3 * s, r * 0.3 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // sword bill (long pointed snout)
    ctx.fillStyle = '#cfddee';
    ctx.beginPath();
    ctx.moveTo(r * 1.4 * s, -r * 0.06);
    ctx.lineTo(r * 2.6 * s, 0);
    ctx.lineTo(r * 1.4 * s, r * 0.06);
    ctx.closePath(); ctx.fill();
    // dorsal fin
    ctx.fillStyle = '#1a3f63';
    ctx.beginPath();
    ctx.moveTo(-r * 0.2 * s, -r * 0.55 * s);
    ctx.lineTo(0, -r * 1.05 * s);
    ctx.lineTo(r * 0.35 * s, -r * 0.5 * s);
    ctx.closePath(); ctx.fill();
    // tail (forked crescent)
    ctx.fillStyle = '#1a3f63';
    ctx.beginPath();
    ctx.moveTo(-r * 1.4 * s, 0);
    ctx.lineTo(-r * 2.1 * s, -r * 0.8 * s);
    ctx.lineTo(-r * 1.7 * s, 0);
    ctx.lineTo(-r * 2.1 * s, r * 0.8 * s);
    ctx.closePath(); ctx.fill();
    // eye
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(r * 0.8 * s, -r * 0.1 * s, r * 0.14 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1424';
    ctx.beginPath(); ctx.arc(r * 0.83 * s, -r * 0.08 * s, r * 0.08 * s, 0, Math.PI * 2); ctx.fill();
    // gill
    ctx.strokeStyle = 'rgba(20,40,70,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(r * 0.5 * s, -r * 0.2); ctx.quadraticCurveTo(r * 0.4 * s, 0, r * 0.5 * s, r * 0.2); ctx.stroke();
  });
}

function drawShark() {
  withFishTransform(function(r, puffT) {
    var s = 1 + puffT * 0.35;
    // body — torpedo with pointier snout
    var grad = ctx.createLinearGradient(0, -r * s, 0, r * s);
    grad.addColorStop(0, '#a9b6c2');
    grad.addColorStop(0.55, '#5d6d7d');
    grad.addColorStop(1, '#2c3a47');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(r * 1.7 * s, 0);
    ctx.quadraticCurveTo(r * 1.1 * s, -r * 0.65 * s, 0, -r * 0.7 * s);
    ctx.quadraticCurveTo(-r * 1.0 * s, -r * 0.55 * s, -r * 1.3 * s, 0);
    ctx.quadraticCurveTo(-r * 1.0 * s, r * 0.55 * s, 0, r * 0.7 * s);
    ctx.quadraticCurveTo(r * 1.1 * s, r * 0.65 * s, r * 1.7 * s, 0);
    ctx.closePath(); ctx.fill();
    // white belly
    ctx.fillStyle = 'rgba(240, 244, 248, 0.85)';
    ctx.beginPath();
    ctx.moveTo(r * 1.4 * s, r * 0.05);
    ctx.quadraticCurveTo(r * 0.6 * s, r * 0.6 * s, -r * 1.0 * s, r * 0.18);
    ctx.quadraticCurveTo(-r * 0.4 * s, r * 0.35 * s, r * 1.4 * s, r * 0.05);
    ctx.closePath(); ctx.fill();
    // dorsal fin — classic triangle
    ctx.fillStyle = '#2c3a47';
    ctx.beginPath();
    ctx.moveTo(-r * 0.05 * s, -r * 0.6 * s);
    ctx.lineTo(r * 0.15 * s, -r * 1.25 * s);
    ctx.lineTo(r * 0.5 * s, -r * 0.55 * s);
    ctx.closePath(); ctx.fill();
    // pectoral fin (lower)
    ctx.fillStyle = '#3d4d5c';
    ctx.beginPath();
    ctx.moveTo(r * 0.2 * s, r * 0.45 * s);
    ctx.lineTo(r * 0.55 * s, r * 1.1 * s);
    ctx.lineTo(r * 0.7 * s, r * 0.4 * s);
    ctx.closePath(); ctx.fill();
    // tail — crescent
    ctx.fillStyle = '#2c3a47';
    ctx.beginPath();
    ctx.moveTo(-r * 1.2 * s, 0);
    ctx.lineTo(-r * 2.0 * s, -r * 0.95 * s);
    ctx.lineTo(-r * 1.55 * s, 0);
    ctx.lineTo(-r * 2.0 * s, r * 0.75 * s);
    ctx.closePath(); ctx.fill();
    // gill slits
    ctx.strokeStyle = 'rgba(20,30,40,0.55)'; ctx.lineWidth = 1.4;
    for (var gi = 0; gi < 3; gi++) {
      var gx = r * (0.55 - gi * 0.1) * s;
      ctx.beginPath();
      ctx.moveTo(gx, -r * 0.18);
      ctx.quadraticCurveTo(gx - 3, 0, gx, r * 0.18);
      ctx.stroke();
    }
    // eye
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(r * 1.05 * s, -r * 0.18 * s, r * 0.12 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a1424';
    ctx.beginPath(); ctx.arc(r * 1.08 * s, -r * 0.16 * s, r * 0.07 * s, 0, Math.PI * 2); ctx.fill();
    // toothy grin
    ctx.strokeStyle = 'rgba(20,20,25,0.65)'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(r * 1.55 * s, r * 0.05);
    ctx.lineTo(r * 1.15 * s, r * 0.22);
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    for (var ti = 0; ti < 4; ti++) {
      var tx = r * (1.5 - ti * 0.1) * s;
      var ty = r * (0.07 + ti * 0.035);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - 2, ty + 3.5);
      ctx.lineTo(tx + 2, ty + 3.5);
      ctx.closePath(); ctx.fill();
    }
  });
}

function drawFish() {
  var r = curRadius();
  var puffT = (fish.puff - 1) / 1.4; // 0..1
  ctx.save();
  ctx.translate(fish.x, fish.y);
  var tilt = Math.max(-0.45, Math.min(0.9, fish.vy * 0.045));
  ctx.rotate(tilt);

  // soft glow when fully puffed
  if (puffT > 0.05) {
    var glow = ctx.createRadialGradient(0, 0, r * 0.6, 0, 0, r * 2);
    glow.addColorStop(0, 'rgba(255,180,80,' + (0.18 * puffT) + ')');
    glow.addColorStop(1, 'rgba(255,180,80,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, r * 2, 0, Math.PI * 2); ctx.fill();
  }

  // tail
  var tailWag = Math.sin(fish.wob) * (3 + puffT * 2);
  ctx.fillStyle = '#c8631e';
  ctx.beginPath();
  var tx = -r * 0.82;
  ctx.moveTo(tx, 0);
  ctx.quadraticCurveTo(tx - r * 0.7, -r * 0.7 + tailWag, tx - r * 0.55, -r * 0.5 + tailWag);
  ctx.lineTo(tx - r * 0.35, 0);
  ctx.lineTo(tx - r * 0.55, r * 0.5 + tailWag);
  ctx.quadraticCurveTo(tx - r * 0.7, r * 0.7 + tailWag, tx, 0);
  ctx.closePath(); ctx.fill();

  // side fins
  ctx.fillStyle = '#d97326';
  ctx.beginPath();
  ctx.ellipse(-r * 0.1, r * 0.7, r * 0.35, r * 0.18, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-r * 0.1, -r * 0.7, r * 0.35, r * 0.18, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // spikes — dramatically longer when puffed, drawn behind body
  var spikes = 16;
  var spikeLen = r * (0.18 + puffT * 1.1);
  var spikeColor = puffT > 0.5 ? '#7a2f0a' : '#a85518';
  ctx.fillStyle = spikeColor;
  for (var i = 0; i < spikes; i++) {
    var a = (i / spikes) * Math.PI * 2;
    var sx = Math.cos(a) * r * 0.92;
    var sy = Math.sin(a) * r * 0.92;
    var ex = Math.cos(a) * (r + spikeLen);
    var ey = Math.sin(a) * (r + spikeLen);
    var nx = -Math.sin(a) * (2.5 + puffT * 1.5);
    var ny = Math.cos(a) * (2.5 + puffT * 1.5);
    ctx.beginPath();
    ctx.moveTo(sx + nx, sy + ny);
    ctx.lineTo(sx - nx, sy - ny);
    ctx.lineTo(ex, ey);
    ctx.closePath();
    ctx.fill();
  }

  // body — color shifts redder when over-puffed
  var bodyGrad = ctx.createRadialGradient(-r * 0.3, -r * 0.35, r * 0.2, 0, 0, r * 1.05);
  if (puffT < 0.5) {
    bodyGrad.addColorStop(0, '#ffe1a8');
    bodyGrad.addColorStop(0.55, '#f5a13c');
    bodyGrad.addColorStop(1, '#9a4f15');
  } else {
    var t = (puffT - 0.5) / 0.5;
    bodyGrad.addColorStop(0, '#ffd6a0');
    bodyGrad.addColorStop(0.55, 'rgb(' + Math.round(245 - 30*t) + ',' + Math.round(120 - 50*t) + ',' + Math.round(60 - 30*t) + ')');
    bodyGrad.addColorStop(1, '#7a2c0a');
  }
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // belly highlight
  ctx.fillStyle = 'rgba(255,245,210,0.55)';
  ctx.beginPath();
  ctx.ellipse(0, r * 0.3, r * 0.7, r * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // top sheen
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.25, -r * 0.4, r * 0.45, r * 0.18, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // dot pattern
  ctx.fillStyle = 'rgba(120,55,15,0.45)';
  var dots = [[r*0.1,-r*0.05],[r*0.3,r*0.15],[-r*0.15,r*0.25],[-r*0.35,-r*0.1],[r*0.05,r*0.4]];
  for (var d = 0; d < dots.length; d++) {
    ctx.beginPath(); ctx.arc(dots[d][0], dots[d][1], r * 0.05, 0, Math.PI * 2); ctx.fill();
  }

  // eyes — grow wider with puff
  var eyeR = r * (0.22 + puffT * 0.08);
  var pupR = r * (0.11 + puffT * 0.04);
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(r * 0.42, -r * 0.28, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a1424';
  ctx.beginPath(); ctx.arc(r * 0.48, -r * 0.24, pupR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(r * 0.53, -r * 0.30, r * 0.045, 0, Math.PI * 2); ctx.fill();

  // mouth — opens when puffed (surprised "o")
  if (puffT > 0.3) {
    ctx.fillStyle = '#3a1a05';
    ctx.beginPath();
    ctx.ellipse(r * 0.92, r * 0.08, r * (0.06 + puffT * 0.06), r * (0.08 + puffT * 0.06), 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.strokeStyle = '#5a280a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(r * 0.88, r * 0.05);
    ctx.quadraticCurveTo(r * 0.98, r * 0.12, r * 1.02, r * 0.04);
    ctx.stroke();
  }

  // cheek blush when very puffed
  if (puffT > 0.6) {
    ctx.fillStyle = 'rgba(255,80,80,' + (0.35 * (puffT - 0.6) / 0.4) + ')';
    ctx.beginPath();
    ctx.ellipse(r * 0.55, r * 0.15, r * 0.18, r * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var a = 1 - p.age / p.life;
    ctx.fillStyle = p.gold ? 'rgba(255, 220, 120,' + a + ')' : 'rgba(220, 240, 255,' + (a * 0.7) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFloor() {
  var g = ctx.createLinearGradient(0, H - 40, 0, H);
  g.addColorStop(0, 'rgba(8, 30, 40, 0)');
  g.addColorStop(1, '#04202c');
  ctx.fillStyle = g;
  ctx.fillRect(0, H - 40, W, 40);
}

function render() {
  ctx.save();
  if (shake > 0.1) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }
  drawBg();
  // far decor
  for (var ti = 0; ti < turtles.length; ti++) drawTurtle(turtles[ti]);
  for (var i = 0; i < jellies.length; i++) drawJelly(jellies[i]);
  for (var j = 0; j < schools.length; j++) drawSchool(schools[j]);
  if (diver) drawDiver(diver);
  for (var sh = 0; sh < seahorses.length; sh++) drawSeahorse(seahorses[sh]);
  drawBubbles();
  // gameplay
  for (var c = 0; c < corals.length; c++) drawCoral(corals[c]);
  drawSeaweed();
  for (var sf = 0; sf < starfish.length; sf++) drawStarfish(starfish[sf]);
  for (var cr = 0; cr < crabs.length; cr++) drawCrab(crabs[cr]);
  if (state !== 'menu') { drawPuffMeter(); drawCharacter(); }
  drawParticles();
  drawFloor();
  ctx.restore();
}

function tick(now) {
  try {
    if (!lastT) lastT = now;
    var dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    if (state === 'playing') update(dt);
    else { camT += dt; // keep decor moving on menu
      for (var bi = 0; bi < bubbles.length; bi++) {
        var bb = bubbles[bi]; bb.y -= bb.sp * dt;
        if (bb.y < -10) { bb.y = H + 10; bb.x = rand(0, W); }
      }
    }
    render();
  } catch (e) { console.error('tick error:', e); }
  requestAnimationFrame(tick);
}

if (restoreBtnEl) {
  restoreBtnEl.addEventListener('click', function() {
    var IAP = getIAP();

    if (!isNativeIAP()) {
      renderChips();
      var c = getOwned().length;
      showToast(c > 0 ? t('restoredN', c) : t('noPurchases'));
      return;
    }
    restoreBtnEl.disabled = true;
    var prev = restoreBtnEl.textContent;
    restoreBtnEl.textContent = t('restoring');
    Promise.resolve(IAP.restore({})).then(function(res) {
      var owned = getOwned();
      (res && res.owned || []).forEach(function(pid) {
        var ch = charForProductId(pid);
        if (ch && owned.indexOf(ch.id) === -1) owned.push(ch.id);
      });
      saveOwned(owned);
      renderChips();
      showToast(owned.length > 0 ? t('restoredN', owned.length) : t('noPurchases'));
    }).catch(function(e) {
      console.warn('IAP restore failed:', e);

function reportAchievementIfNew(ach) {
  var reported = getReportedAchievements();
  if (reported[ach.id]) return;
  reported[ach.id] = true;
  saveReportedAchievements(reported);
  var GC = getGC();
  if (!GC) return;
  Promise.resolve(GC.reportAchievement({ id: ach.id, percent: 100, banner: true }))
    .catch(function (e) { console.warn('Achievement report failed:', e); });
}

function getPlays() {
  return parseInt(localStorage.getItem(PLAYS_KEY) || '0', 10);
}
function bumpPlays() {
  var n = getPlays() + 1;
  try { localStorage.setItem(PLAYS_KEY, String(n)); } catch (e) {}
  return n;
}
function checkAchievements(score) {
  var plays = getPlays();
  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    var a = ACHIEVEMENTS[i];
    if (a.type === 'score' && score >= a.threshold) reportAchievementIfNew(a);
    if (a.type === 'plays' && plays >= a.threshold) reportAchievementIfNew(a);
    if (a.type === 'owned') {
      var ownedPaid = getOwned().filter(function (id) { return id !== 'puffer'; }).length;
      if (ownedPaid + 1 >= a.threshold) reportAchievementIfNew(a);
    }
  }
}

function gcAuthenticate() {
  var GC = getGC();
  if (!GC) return;
  Promise.resolve(GC.authenticate({}))
    .then(function (res) {
      if (res && res.authenticated) {
        try { localStorage.setItem(GC_PLAYER_KEY, res.displayName || ''); } catch (e) {}
        // Submit current best score so the leaderboard catches up.
        if (bestScore > 0) {
          Promise.resolve(GC.submitScore({ score: bestScore, leaderboardID: LEADERBOARD_ID }))
            .catch(function (e) { console.warn('GC submitScore failed:', e); });
        }
      }
    })
    .catch(function (e) { console.warn('GC authenticate failed:', e); });
}

// Hook for the existing die() flow — called after bestScore is updated.
window.gcOnNewBest = function (score) {
  var GC = getGC();
  if (!GC) return;
  Promise.resolve(GC.submitScore({ score: score, leaderboardID: LEADERBOARD_ID }))
    .catch(function (e) { console.warn('GC submitScore failed:', e); });
};

// Wire the new buttons
var leaderboardBtnEl  = document.getElementById('leaderboardBtn');
var achievementsBtnEl = document.getElementById('achievementsBtn');
var signInBtnEl       = document.getElementById('signInBtn');

if (leaderboardBtnEl) {
  leaderboardBtnEl.addEventListener('click', function () {
    var GC = getGC();
    if (!GC) { showToast(t('gcOnlyIOS')); return; }
    Promise.resolve(GC.showLeaderboard({ leaderboardID: LEADERBOARD_ID }))
      .catch(function (e) { showToast(t('gcSignIn')); console.warn(e); });
  });
}
if (achievementsBtnEl) {
  achievementsBtnEl.addEventListener('click', function () {
    var GC = getGC();
    if (!GC) { showToast(t('gcOnlyIOS')); return; }
    Promise.resolve(GC.showAchievements({}))
      .catch(function (e) { showToast(t('gcSignIn')); console.warn(e); });
  });
}

function updateSignInButton(name) {
  if (!signInBtnEl) return;
  if (name) signInBtnEl.textContent = t('signedIn', name);
  else signInBtnEl.textContent = t('signIn');
}
try { updateSignInButton(localStorage.getItem(SIWA_USER_KEY) || ''); } catch (e) {}

if (signInBtnEl) {
  signInBtnEl.addEventListener('click', function () {
    var SIWA = getSIWA();
    if (!SIWA) { showToast(t('siwaOnlyIOS')); return; }
    var existing = '';
    try { existing = localStorage.getItem(SIWA_USER_KEY) || ''; } catch (e) {}
    if (existing) {
      if (!confirm(t('confirmDeleteAccount'))) return;
      Promise.resolve(SIWA.deleteAccount({})).then(function () {
        try {
          localStorage.removeItem(SIWA_USER_KEY);
          localStorage.removeItem(BEST_KEY);
          localStorage.removeItem(CHAR_KEY);
          localStorage.removeItem(SOUND_KEY);
          localStorage.removeItem(OWNED_KEY);
          localStorage.removeItem(ACH_KEY);
        } catch (e) {}
        bestScore = 0; selectedChar = 'puffer'; soundOn = true;
        if (typeof updateSoundToggle === 'function') updateSoundToggle();
        renderChips(); updateCardBest();
        updateSignInButton('');
        showToast(t('accountDeleted'));
      }).catch(function (e) { showToast(t('deleteFailed')); console.warn(e); });
      return;
    }
    Promise.resolve(SIWA.signIn({})).then(function (res) {
      var name = ((res.givenName || '') + ' ' + (res.familyName || '')).trim() || 'Player';
      try { localStorage.setItem(SIWA_USER_KEY, name); } catch (e) {}
      updateSignInButton(name);
      showToast(t('welcome', name));
    }).catch(function (e) {
      if (String(e).indexOf('canceled') === -1) showToast(t('signInFailed'));
      console.warn(e);
    });
  });
}

// Home + More buttons
var homeBtnEl = document.getElementById('homeBtn');
if (homeBtnEl) homeBtnEl.addEventListener('click', goHome);

var moreBtnEl = document.getElementById('moreBtn');
var moreOptionsEl = document.getElementById('moreOptions');
if (moreBtnEl && moreOptionsEl) {
  moreBtnEl.addEventListener('click', function () {
    var hidden = moreOptionsEl.classList.toggle('hidden');
    moreBtnEl.textContent = hidden ? '⋯ ' + t('more') : '× ' + t('less');
  });
}

// On non-iOS (web), hide the buttons that genuinely only work on iOS so
// visitors aren't greeted with three useless "iOS only" toasts.
if (!isNative()) {
  ['leaderboardBtn', 'achievementsBtn', 'signInBtn'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.classList.add('hidden');
  });
  // The Leaderboard/Achievements row would be left as an empty flex
  // container; hide it too if both children disappeared.
  var actionRow = document.querySelector('.action-row');
  if (actionRow && actionRow.children.length &&
      Array.prototype.every.call(actionRow.children, function(c){ return c.classList.contains('hidden'); })) {
    actionRow.classList.add('hidden');
  }
}

// Authenticate Game Center silently on launch
if (isNative()) gcAuthenticate();

// Load products + entitlements on launch (silent if no native plugin)
loadIAPProducts();
// React to interrupted/promoted transactions reported by StoreKit
if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.IAP) {
  try {
    window.Capacitor.Plugins.IAP.addListener('transactionUpdate', function(evt) {
      var ch = charForProductId(evt && evt.productId);
      if (!ch) return;
      var owned = getOwned();
      if (owned.indexOf(ch.id) === -1) {
        owned.push(ch.id);
        saveOwned(owned);
        renderChips();
        showToast(ch.name + ' unlocked');
      }
    });
  } catch (e) { /* listener not supported */ }
}
var privacyLinkEl = document.getElementById('privacyLink');
if (privacyLinkEl) {
  privacyLinkEl.addEventListener('click', function(e) { e.preventDefault(); openExternal(PRIVACY_URL); });
}
var termsLinkEl = document.getElementById('termsLink');
if (termsLinkEl) {
  termsLinkEl.addEventListener('click', function(e) { e.preventDefault(); openExternal(TERMS_URL); });
}

// Sound toggle
var soundToggleEl = document.getElementById('soundToggle');
function updateSoundToggle() { soundToggleEl.textContent = soundOn ? '🔊' : '🔇'; }
updateSoundToggle();
soundToggleEl.addEventListener('click', function() {
  soundOn = !soundOn;
  try { localStorage.setItem(SOUND_KEY, soundOn ? '1' : '0'); } catch(e){}
  if (soundOn) ensureAudio();
  updateSoundToggle();
});

function onPress(e) {
  if (e) e.preventDefault();
  ensureAudio();
  if (state === 'playing') flap();
}
cv.addEventListener('mousedown', onPress);
cv.addEventListener('touchstart', onPress, { passive: false });
window.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    ensureAudio();
    if (state === 'playing') flap();
    else startGame();
  }
});
btn.addEventListener('click', function() { ensureAudio(); startGame(); });
</script>
</body>
</html>
