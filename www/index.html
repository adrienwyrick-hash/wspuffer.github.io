<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#062a3a" />
<title>WSPuffer</title>
<style>
  html,body{margin:0;height:100%;
    background:linear-gradient(180deg,#021522 0%,#062a3a 45%,#0c4660 100%);
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#eaf7ff;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;touch-action:none;}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}
  /* Ambient CSS bubbles (background layer, behind the card) */
  .bubbles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
  .bubble{position:absolute;bottom:-60px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.75), rgba(255,255,255,.05) 70%);
    box-shadow:inset 0 0 4px rgba(255,255,255,.3);
    animation:rise linear infinite;opacity:0;}
  @keyframes rise{
    0%{transform:translate(0,0) scale(.9);opacity:0;}
    8%{opacity:.55;}
    50%{transform:translate(14px,-50vh) scale(1);}
    100%{transform:translate(-10px,-110vh) scale(1.05);opacity:0;}
  }
  #hud{position:fixed;top:24px;left:0;right:0;text-align:center;
    font-size:46px;font-weight:800;letter-spacing:1px;text-shadow:0 2px 12px #0008;
    pointer-events:none;z-index:4;}
  #best{position:fixed;top:82px;left:0;right:0;text-align:center;
    font-size:12px;opacity:.6;pointer-events:none;letter-spacing:2px;z-index:4;}
  #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:2;}
  /* Liquid glass card — clear variant with subtle dim layer for legibility */
  .card{position:relative;
    background:linear-gradient(160deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.04) 50%, rgba(0,0,0,.18) 100%);
    backdrop-filter:blur(28px) saturate(180%) brightness(1.05);
    -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.05);
    border:1px solid rgba(255,255,255,.14);
    border-radius:32px;padding:30px 30px 26px;max-width:340px;width:100%;text-align:center;
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.32),
      inset 0 -1px 0 rgba(0,0,0,.2),
      0 30px 90px rgba(0,0,0,.55);
    animation:cardIn .55s cubic-bezier(.2,.9,.25,1) both;}
  .card::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 35%);}
  @keyframes cardIn{
    0%{opacity:0;transform:translateY(14px) scale(.97);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }
  h1{margin:0 0 6px;font-size:34px;letter-spacing:.5px;font-weight:900;
    background:linear-gradient(180deg,#fff5dc 0%,#ffb84d 60%,#ff8a2e 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,184,77,.55)) drop-shadow(0 0 28px rgba(255,184,77,.25));}
  p{margin:0 0 20px;opacity:.85;font-size:14.5px;line-height:1.5;color:#dbeefb;}
  /* Prominent glass — Dive in CTA */
  button#btn{position:relative;overflow:hidden;
    background:linear-gradient(180deg, rgba(255,210,140,.55) 0%, rgba(255,160,60,.35) 55%, rgba(180,80,20,.45) 100%);
    backdrop-filter:blur(20px) saturate(200%);
    -webkit-backdrop-filter:blur(20px) saturate(200%);
    border:1px solid rgba(255,210,140,.55);
    color:#fff;font-weight:900;letter-spacing:.6px;
    padding:15px 36px;border-radius:999px;font-size:17px;cursor:pointer;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.55),
      inset 0 -1.5px 0 rgba(0,0,0,.25),
      0 18px 46px rgba(255,150,40,.4),
      0 4px 12px rgba(0,0,0,.3);
    animation:pulse 2s ease-in-out infinite;}
  button#btn::after{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(110deg, transparent 0%, rgba(255,255,255,.5) 50%, transparent 100%);
    transform:skewX(-20deg);animation:shine 2.8s ease-in-out infinite;
    border-radius:inherit;}
  button#btn:active{transform:translateY(1px) scale(.99);animation:none;}
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.035);}
  }
  @keyframes shine{
    0%{left:-60%;} 60%{left:120%;} 100%{left:120%;}
  }
  .hidden{display:none !important;}
  /* Splash screen */
  #splash{position:fixed;inset:0;z-index:1000;background:#021522;
    transition:opacity .35s ease;}
  #splash.gone{opacity:0;pointer-events:none;}
  #splash canvas{display:block;width:100%;height:100%;}
  #chars{display:flex;gap:10px;justify-content:center;margin:10px 0 20px;flex-wrap:wrap;}
  .chip{width:64px;height:64px;border-radius:18px;
    background:linear-gradient(160deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.02) 50%, rgba(0,0,0,.18) 100%);
    backdrop-filter:blur(14px) saturate(160%);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid rgba(255,255,255,.14);
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
    position:relative;
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.32),
      inset 0 -1px 0 rgba(0,0,0,.15),
      0 8px 22px rgba(0,0,0,.4);}
  .chip:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.14);}
  .chip canvas{position:static;width:48px !important;height:48px !important;}
  .chip-emoji{display:inline-block;font-size:30px;line-height:1;
    transform-origin:center;
    animation:chipSwim 2.6s ease-in-out infinite;}
  @keyframes chipSwim{
    0%,100%{transform:scaleX(-1) translateY(0) rotate(-4deg);}
    50%    {transform:scaleX(-1) translateY(-3px) rotate(4deg);}
  }
  .chip .lbl{position:absolute;bottom:3px;font-size:9px;opacity:.7;letter-spacing:.5px;}
  .chip.locked{opacity:.55;cursor:not-allowed;}
  .chip.locked:hover{transform:none;}
  .chip.locked .lbl{opacity:1;color:#ffd28a;font-weight:700;}
  .chip.selected{border-color:#ffb84d;transform:translateY(-3px);
    box-shadow:0 8px 22px rgba(255,184,77,.35),inset 0 1px 0 rgba(255,255,255,.12);
    background:linear-gradient(160deg,#10384c 0%,#072030 100%);}
  #soundToggle{position:fixed;top:24px;right:18px;background:#0a3a4eaa;border:1px solid #ffffff1a;
    color:#eaf7ff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;padding:0;}
  .card-best{margin-top:14px;font-size:11px;letter-spacing:3px;opacity:.7;color:#cfe9ff;
    text-transform:uppercase;}
  .card-best strong{color:#ffd28a;font-weight:800;letter-spacing:1.5px;margin-left:4px;}
  /* On the game-over screen the card goes transparent so only the
     title + score + buttons float against the underwater scene. */
  .card.dead{
    background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;
    border-color:transparent;box-shadow:none;}
  .card.dead::before{display:none;}
  .card.dead #chars,.card.dead .card-actions,.card.dead .legal,
  .card.dead #cardBest{display:none;}
  /* CTA row: home + play now side by side on the game-over screen */
  .cta-row{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;}
  /* Home button matches Play Now / Try Again — same prominent gold glass */
  #homeBtn{position:relative;overflow:hidden;
    background:linear-gradient(180deg, rgba(255,210,140,.55) 0%, rgba(255,160,60,.35) 55%, rgba(180,80,20,.45) 100%);
    backdrop-filter:blur(20px) saturate(200%);
    -webkit-backdrop-filter:blur(20px) saturate(200%);
    border:1px solid rgba(255,210,140,.55);
    color:#fff;font-weight:900;letter-spacing:.6px;
    padding:15px 28px;border-radius:999px;font-size:17px;cursor:pointer;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.55),
      inset 0 -1.5px 0 rgba(0,0,0,.25),
      0 18px 46px rgba(255,150,40,.4),
      0 4px 12px rgba(0,0,0,.3);
    animation:pulse 2s ease-in-out infinite;
    min-width:auto;}
  #homeBtn::after{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(110deg, transparent 0%, rgba(255,255,255,.5) 50%, transparent 100%);
    transform:skewX(-20deg);animation:shine 2.8s ease-in-out infinite;
    border-radius:inherit;}
  #homeBtn:active{transform:translateY(1px) scale(.99);animation:none;}
  .card-actions{margin-top:18px;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .action-row{display:flex;gap:8px;width:100%;justify-content:center;}
  .card .link.half{flex:1;min-width:0;padding:9px 8px;}
  /* Apple-spec Sign in with Apple button */
  .card .link.siwa{
    background:#000;
    border:1px solid #000;
    color:#fff;
    backdrop-filter:none;-webkit-backdrop-filter:none;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
    padding:11px 18px;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    min-height:44px;position:relative;overflow:hidden;
    font-weight:600;font-size:14px;letter-spacing:.2px;
    animation:siwaPulse 3.6s ease-in-out infinite;}
  .card .link.siwa::before{content:none;}
  .card .link.siwa::after{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(110deg, transparent 0%, rgba(255,255,255,.18) 50%, transparent 100%);
    transform:skewX(-20deg);animation:siwaShine 3.6s ease-in-out infinite;border-radius:inherit;}
  .card .link.siwa:hover{background:#0a0a0a;}
  .card .link.siwa:active{transform:translateY(1px) scale(.99);}
  .card .link.siwa .siwa-logo{
    width:16px;height:18px;display:inline-block;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fff'><path d='M16.365 1.43c0 1.14-.46 2.23-1.24 3.04-.78.82-2.05 1.45-3.1 1.36-.13-1.11.42-2.27 1.18-3.04.77-.8 2.07-1.41 3.16-1.36zM20.39 17.4c-.6 1.4-.88 2.02-1.65 3.26-1.07 1.72-2.58 3.86-4.45 3.88-1.67.02-2.1-1.09-4.37-1.08-2.27.01-2.74 1.1-4.41 1.08-1.87-.02-3.3-1.96-4.37-3.68C-.42 16.5-.7 11.17 1.27 8.34c1.4-2 3.6-3.18 5.67-3.18 2.11 0 3.44 1.16 5.18 1.16 1.69 0 2.72-1.16 5.16-1.16 1.85 0 3.81 1 5.21 2.74-4.58 2.51-3.84 9.04-2.1 9.5z'/></svg>") center/contain no-repeat;}
  .card .link.siwa .siwa-text{display:inline;}
  @keyframes siwaPulse{
    0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.4);}
    50%   {box-shadow:0 10px 28px rgba(120,140,255,.35),0 6px 18px rgba(0,0,0,.4);}
  }
  @keyframes siwaShine{
    0%{left:-60%;} 70%{left:120%;} 100%{left:120%;}
  }
  .more-toggle{opacity:.7;font-size:12px !important;padding:6px 14px !important;min-width:auto !important;}
  .more-toggle:hover{opacity:1;}
  #moreOptions{display:flex;flex-direction:column;gap:8px;width:100%;align-items:center;
    animation:fadeIn .25s ease both;}
  #moreOptions.hidden{display:none;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  /* Clear liquid glass — secondary action buttons */
  .card .link{position:relative;overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.04) 50%, rgba(0,0,0,.10) 100%);
    backdrop-filter:blur(16px) saturate(160%);
    -webkit-backdrop-filter:blur(16px) saturate(160%);
    border:1px solid rgba(255,255,255,.14);
    color:#eaf7ff;font-size:13px;font-weight:600;letter-spacing:.3px;
    padding:9px 18px;border-radius:999px;cursor:pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.28),
      inset 0 -1px 0 rgba(0,0,0,.16),
      0 6px 18px rgba(0,0,0,.35);
    animation:none;min-width:180px;
    transition:transform .15s ease, background .2s ease;}
  .card .link::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.16) 0%, transparent 40%);}
  .card .link::after{content:none;}
  .card .link:hover{background:linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.06) 50%, rgba(0,0,0,.10) 100%);}
  .card .link:active{transform:translateY(1px) scale(.99);opacity:.85;}
  .card .link.danger{color:#ffc4c4;border-color:rgba(255,150,150,.22);}
  .card .link.danger:hover{background:linear-gradient(180deg, rgba(255,120,120,.16) 0%, rgba(255,80,80,.08) 50%, rgba(0,0,0,.10) 100%);}
  .legal{margin-top:8px;font-size:11px;opacity:.55;color:#cfe9ff;letter-spacing:.3px;}
  .legal a{color:inherit;text-decoration:underline;text-underline-offset:2px;}
  .legal .dot{margin:0 6px;opacity:.6;}
  .toast{position:fixed;left:50%;bottom:38px;transform:translate(-50%,20px);
    background:#0a3a4eee;border:1px solid #ffffff1a;color:#eaf7ff;
    padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;
    box-shadow:0 12px 30px rgba(0,0,0,.45);
    opacity:0;transition:opacity .25s ease,transform .25s ease;z-index:600;pointer-events:none;}
  .toast.show{opacity:1;transform:translate(-50%,0);}
  .unlockBanner{background:#ffb84d;color:#3a1f00;padding:8px 14px;border-radius:10px;
    font-weight:800;font-size:14px;margin-bottom:14px;letter-spacing:.5px;}
  /* Paywall + bundle */
  .chip .lock{position:absolute;top:3px;right:4px;font-size:11px;opacity:.85;}
  .chip.locked{opacity:.7;}
  .chip.locked .lbl{color:#ffd28a;font-weight:700;}
  #purchase{position:fixed;inset:0;background:#021522dd;backdrop-filter:blur(8px);
    z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;
    transition:opacity .2s ease;}
  #purchase.hidden{opacity:0;pointer-events:none;}
  #purchase .sheet{
    background:linear-gradient(160deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.04) 50%, rgba(0,0,0,.20) 100%);
    backdrop-filter:blur(28px) saturate(180%) brightness(1.05);
    -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.05);
    border:1px solid rgba(255,255,255,.14);
    border-radius:28px;padding:26px;max-width:300px;width:100%;text-align:center;
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.32),
      inset 0 -1px 0 rgba(0,0,0,.2),
      0 30px 80px rgba(0,0,0,.6);}
  #purchase .picon{font-size:60px;line-height:1;margin-bottom:10px;
    filter:drop-shadow(0 0 18px rgba(255,184,77,.55));}
  #purchase .ptitle{font-size:22px;font-weight:800;margin:0 0 4px;}
  #purchase .psub{font-size:13px;opacity:.75;margin:0 0 16px;}
  #purchase .pprice{font-size:34px;font-weight:800;color:#ffb84d;margin-bottom:16px;
    text-shadow:0 0 18px rgba(255,184,77,.45);}
  #purchase .buy{position:relative;overflow:hidden;
    background:linear-gradient(180deg, rgba(255,210,140,.55) 0%, rgba(255,160,60,.35) 55%, rgba(180,80,20,.45) 100%);
    backdrop-filter:blur(20px) saturate(200%);
    -webkit-backdrop-filter:blur(20px) saturate(200%);
    border:1px solid rgba(255,210,140,.55);color:#fff;
    font-weight:900;letter-spacing:.5px;text-shadow:0 1px 2px rgba(0,0,0,.35);
    padding:13px 32px;border-radius:999px;font-size:15px;cursor:pointer;width:100%;
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,.55),
      inset 0 -1.5px 0 rgba(0,0,0,.25),
      0 14px 36px rgba(255,150,40,.4);}
  #purchase .cancel{background:transparent;border:0;color:#eaf7ff;font-size:13px;
    opacity:.55;margin-top:8px;cursor:pointer;padding:8px;width:100%;}
</style>
</head>
<body>
<div id="splash"><canvas id="splashCv"></canvas></div>
<canvas id="cv"></canvas>
<div class="bubbles" aria-hidden="true">
  <span class="bubble" style="left:6%;width:10px;height:10px;animation-duration:13s;animation-delay:0s;"></span>
  <span class="bubble" style="left:14%;width:18px;height:18px;animation-duration:18s;animation-delay:3s;"></span>
  <span class="bubble" style="left:22%;width:7px;height:7px;animation-duration:10s;animation-delay:1s;"></span>
  <span class="bubble" style="left:30%;width:22px;height:22px;animation-duration:22s;animation-delay:6s;"></span>
  <span class="bubble" style="left:40%;width:9px;height:9px;animation-duration:12s;animation-delay:2s;"></span>
  <span class="bubble" style="left:50%;width:14px;height:14px;animation-duration:16s;animation-delay:5s;"></span>
  <span class="bubble" style="left:60%;width:6px;height:6px;animation-duration:9s;animation-delay:4s;"></span>
  <span class="bubble" style="left:70%;width:20px;height:20px;animation-duration:20s;animation-delay:7s;"></span>
  <span class="bubble" style="left:80%;width:11px;height:11px;animation-duration:14s;animation-delay:1.5s;"></span>
  <span class="bubble" style="left:90%;width:16px;height:16px;animation-duration:17s;animation-delay:3.5s;"></span>
</div>
<div id="hud" class="hidden">0</div>
<div id="best" class="hidden"></div>
<button id="soundToggle" title="Toggle sound">🔊</button>
<div id="overlay">
  <div class="card" id="card">
    <div id="unlockBanner" class="unlockBanner hidden"></div>
    <h1 id="title">WSPuffer</h1>
    <p id="sub">Tap to puff up and rise. Stop tapping to shrink back down. Bigger = harder to fit through the coral.</p>
    <div id="chars"></div>
    <div class="cta-row">
      <button id="homeBtn" class="link hidden" type="button">⌂ Home</button>
      <button id="btn">▶ Play Now</button>
    </div>
    <div id="cardBest" class="card-best hidden"></div>
    <div class="card-actions">
      <div class="action-row">
        <button id="leaderboardBtn" class="link half" type="button">🏆 Leaderboard</button>
        <button id="achievementsBtn" class="link half" type="button">🎖 Achievements</button>
      </div>
      <button id="signInBtn" class="link siwa" type="button"><span class="siwa-logo"></span><span class="siwa-text">Sign in with Apple</span></button>
      <button id="restoreBtn" class="link" type="button">Restore Purchases</button>
      <button id="moreBtn" class="link more-toggle" type="button">⋯ More</button>
      <div id="moreOptions" class="hidden">
        <button id="eraseBtn" class="link danger" type="button">Erase My Data</button>
      </div>
    </div>
    <div class="legal">
      <a id="privacyLink" href="#" rel="noopener">Privacy Policy</a>
      <span class="dot">·</span>
      <a id="termsLink" href="#" rel="noopener">Terms of Use</a>
    </div>
  </div>
</div>
<div id="toast" class="toast hidden"></div>
<div id="purchase" class="hidden">
  <div class="sheet">
    <div class="picon" id="pIcon">🐠</div>
    <h2 class="ptitle" id="pTitle">Unlock</h2>
    <p class="psub" id="pSub"></p>
    <div class="pprice" id="pPrice">$0.99</div>
    <button class="buy" id="pBuy">Buy</button>
    <button class="cancel" id="pCancel">Maybe later</button>
  </div>
</div>
<script>
"use strict";
(function() {
  var splash = document.getElementById('splash');
  var scv = document.getElementById('splashCv');
  if (!splash || !scv) return;
  var sctx = scv.getContext('2d');
  var SDPR = Math.min(window.devicePixelRatio || 1, 2);
  var sw = 0, sh = 0;
  function sresize() {
    sw = window.innerWidth; sh = window.innerHeight;
    scv.width = Math.floor(sw * SDPR);
    scv.height = Math.floor(sh * SDPR);
    sctx.setTransform(SDPR, 0, 0, SDPR, 0, 0);
  }
  sresize();
  window.addEventListener('resize', sresize);

  var TITLE = 'WSPuffer';
  var FONT = 'bold 56px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  var trail = [];
  var startT = 0;
  var skipToPuff = false;
  var dismissed = false;
  var dismissAt = 0;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
  function easeIn(t) { return t * t; }
  function rnd(a, b) { return a + Math.random() * (b - a); }

  // ---- Splash environment (reef floor, bubbles, scuba divers) ----
  var splashDecor = null;
  function buildSplashDecor() {
    var pillars = [];
    var n = Math.max(4, Math.floor(sw / 220));
    for (var i = 0; i < n; i++) {
      var pw = rnd(70, 130);
      var ph = rnd(sh * 0.22, sh * 0.38);
      var cx = (i + 0.5) * (sw / n) + rnd(-30, 30);
      var p = { x: cx - pw / 2, w: pw, h: ph,
                seed: Math.random() * 100, hue: 290 + Math.random() * 80,
                flowers: [] };
      // dense flowers along this pillar
      var fcount = Math.floor(ph / 22) + 3;
      for (var f = 0; f < fcount; f++) {
        var t = (f + 0.1 + Math.random() * 0.8) / fcount;
        p.flowers.push({
          side: Math.random() < 0.5 ? -1 : 1,
          y: t * ph,
          type: Math.floor(Math.random() * 3),
          hue: 280 + Math.random() * 140,
          size: 8 + Math.random() * 10,
          phase: Math.random() * Math.PI * 2
        });
      }
      pillars.push(p);
    }
    var bubbles = [];
    var bc = Math.max(30, Math.floor((sw * sh) / 22000));
    for (var b = 0; b < bc; b++) {
      bubbles.push({ x: Math.random() * sw, y: Math.random() * sh,
        r: rnd(1.8, 5), sp: rnd(22, 56), wob: Math.random() * Math.PI * 2,
        a: rnd(0.3, 0.6) });
    }
    var divers = [];
    var dn = sw > 700 ? 2 : 1;
    for (var d = 0; d < dn; d++) {
      divers.push({ x: rnd(-200, sw * 0.3), y: rnd(sh * 0.4, sh * 0.6),
        sp: rnd(22, 36), ph: Math.random() * Math.PI * 2, bubbleT: 0 });
    }
    splashDecor = { pillars: pillars, bubbles: bubbles, divers: divers };
  }

  function drawSplashFlower(x, y, side, type, size, hue, t, phase) {
    var sway = Math.sin(t * 2.2 + phase) * 1.8;
    sctx.save();
    sctx.translate(x + side * sway, y);
    sctx.scale(side, 1);
    if (type === 0) {
      // anemone
      sctx.strokeStyle = 'hsl(' + hue + ',85%,72%)';
      sctx.lineWidth = 2.0;
      sctx.lineCap = 'round';
      var tend = 9;
      for (var i = 0; i < tend; i++) {
        var a = -Math.PI * 0.55 + (i / (tend - 1)) * Math.PI * 1.1;
        var len = size * (0.9 + Math.sin(i + t * 2) * 0.12);
        sctx.beginPath();
        sctx.moveTo(0, 0);
        sctx.quadraticCurveTo(Math.cos(a) * len * 0.6 + sway * 0.5,
                              Math.sin(a) * len * 0.6,
                              Math.cos(a) * len, Math.sin(a) * len);
        sctx.stroke();
      }
      sctx.fillStyle = 'hsl(' + hue + ',90%,55%)';
      sctx.beginPath(); sctx.arc(0, 0, size * 0.42, 0, Math.PI * 2); sctx.fill();
      sctx.fillStyle = 'hsl(' + hue + ',95%,80%)';
      sctx.beginPath(); sctx.arc(-size * 0.14, -size * 0.14, size * 0.18, 0, Math.PI * 2); sctx.fill();
    } else if (type === 1) {
      // polyp cluster
      sctx.fillStyle = 'hsl(' + (hue - 20) + ',70%,38%)';
      sctx.beginPath();
      for (var k = 0; k < 6; k++) {
        var ang = k * (Math.PI * 2 / 6);
        sctx.moveTo(Math.cos(ang) * size, Math.sin(ang) * size);
        sctx.arc(Math.cos(ang) * size * 0.5, Math.sin(ang) * size * 0.5, size * 0.55, 0, Math.PI * 2);
      }
      sctx.fill();
      sctx.fillStyle = 'hsl(' + hue + ',95%,72%)';
      for (var p = 0; p < 8; p++) {
        var pa = p * 1.3;
        sctx.beginPath();
        sctx.arc(Math.cos(pa) * size * 0.35, Math.sin(pa) * size * 0.35, size * 0.18, 0, Math.PI * 2);
        sctx.fill();
      }
    } else {
      // sea fan
      sctx.strokeStyle = 'hsl(' + hue + ',75%,58%)';
      sctx.lineWidth = 2.2;
      sctx.lineCap = 'round';
      for (var bf = 0; bf < 6; bf++) {
        var ba = -Math.PI * 0.55 + (bf / 5) * Math.PI * 1.1;
        sctx.beginPath();
        sctx.moveTo(0, 0);
        sctx.quadraticCurveTo(Math.cos(ba) * size * 0.35,
                              Math.sin(ba) * size * 0.35 - size * 0.2,
                              Math.cos(ba) * size, Math.sin(ba) * size);
        sctx.stroke();
      }
      sctx.fillStyle = 'hsl(' + hue + ',85%,68%)';
      for (var df = 0; df < 6; df++) {
        var da = -Math.PI * 0.55 + (df / 5) * Math.PI * 1.1;
        sctx.beginPath();
        sctx.arc(Math.cos(da) * size, Math.sin(da) * size, size * 0.18, 0, Math.PI * 2);
        sctx.fill();
      }
    }
    sctx.restore();
  }

  function drawSplashPillar(p, t, baseY) {
    var pillX = p.x, pw = p.w, ph = p.h;
    var top = baseY - ph;
    // jagged clip
    sctx.save();
    sctx.beginPath();
    sctx.moveTo(pillX, top);
    var step = 10;
    for (var y = top; y <= baseY; y += step) {
      var bump = Math.sin((y + p.seed) * 0.22) * 5 + Math.sin((y + p.seed) * 0.71) * 2;
      sctx.lineTo(pillX + bump, y);
    }
    sctx.lineTo(pillX + pw, baseY);
    for (var y2 = baseY; y2 >= top; y2 -= step) {
      var bump2 = Math.sin((y2 + p.seed + 19) * 0.24) * 5 + Math.cos((y2 + p.seed) * 0.6) * 2.5;
      sctx.lineTo(pillX + pw + bump2, y2);
    }
    sctx.closePath();
    sctx.clip();
    var g = sctx.createLinearGradient(pillX, 0, pillX + pw, 0);
    g.addColorStop(0, '#5b2a55');
    g.addColorStop(0.5, '#8a3a78');
    g.addColorStop(1, '#42204a');
    sctx.fillStyle = g;
    sctx.fillRect(pillX - 6, top, pw + 12, ph);
    sctx.fillStyle = 'rgba(255,180,210,0.18)';
    for (var sp = 0; sp < 16; sp++) {
      var sy = top + ((sp * 37 + p.seed * 13) % ph);
      var sx = pillX + ((sp * 11 + p.seed * 7) % pw);
      sctx.beginPath(); sctx.arc(sx, sy, 1.6, 0, Math.PI * 2); sctx.fill();
    }
    sctx.restore();
    // flowers (densely placed)
    for (var i = 0; i < p.flowers.length; i++) {
      var f = p.flowers[i];
      var fx = f.side > 0 ? pillX + pw : pillX;
      drawSplashFlower(fx, top + f.y, f.side, f.type, f.size, f.hue, t, f.phase);
    }
  }

  function drawSplashReef(t, dt) {
    if (!splashDecor) buildSplashDecor();
    var baseY = sh - 30;
    // dark seabed
    var sg = sctx.createLinearGradient(0, baseY - 80, 0, sh);
    sg.addColorStop(0, '#0a2030');
    sg.addColorStop(1, '#020a14');
    sctx.fillStyle = sg;
    sctx.beginPath();
    sctx.moveTo(0, sh);
    sctx.lineTo(0, baseY);
    for (var x = 0; x <= sw; x += 16) {
      sctx.lineTo(x, baseY - 8 + Math.sin(x * 0.05) * 6 + Math.sin(x * 0.13) * 3);
    }
    sctx.lineTo(sw, sh);
    sctx.closePath();
    sctx.fill();
    // pillars + flowers
    for (var i = 0; i < splashDecor.pillars.length; i++) {
      drawSplashPillar(splashDecor.pillars[i], t * 0.001, baseY);
    }
  }

  function drawSplashBubbles(dt, now) {
    if (!splashDecor) return;
    var bs = splashDecor.bubbles;
    for (var i = 0; i < bs.length; i++) {
      var b = bs[i];
      b.y -= b.sp * dt;
      b.x += Math.sin(now * 0.001 + b.wob) * 8 * dt;
      if (b.y < -10) { b.y = sh + 10; b.x = Math.random() * sw; }
      var bg = sctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1, b.x, b.y, b.r);
      bg.addColorStop(0, 'rgba(255,255,255,' + (b.a * 0.9) + ')');
      bg.addColorStop(0.7, 'rgba(255,255,255,' + (b.a * 0.25) + ')');
      bg.addColorStop(1, 'rgba(255,255,255,0)');
      sctx.fillStyle = bg;
      sctx.beginPath(); sctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); sctx.fill();
    }
  }

  function drawScubaDiver(d, t, dt) {
    sctx.save();
    sctx.translate(d.x, d.y + Math.sin(t * 0.7 + d.ph) * 6);
    // body (dark wetsuit)
    sctx.fillStyle = '#1c2c41';
    sctx.beginPath();
    sctx.ellipse(0, 4, 22, 14, 0, 0, Math.PI * 2); sctx.fill();
    // helmet
    var hg = sctx.createRadialGradient(-4, -4, 2, 0, 0, 14);
    hg.addColorStop(0, '#dfeaf6');
    hg.addColorStop(0.7, '#7e9fb8');
    hg.addColorStop(1, '#3a536a');
    sctx.fillStyle = hg;
    sctx.beginPath(); sctx.arc(0, -10, 13, 0, Math.PI * 2); sctx.fill();
    // tank on back
    sctx.fillStyle = '#cfa040';
    sctx.fillRect(-22, -8, 6, 16);
    // fins (animated kick)
    var kick = Math.sin(d.ph + t * 8) * 4;
    sctx.fillStyle = '#0b1f33';
    sctx.beginPath();
    sctx.moveTo(-18, 16);
    sctx.lineTo(-30, 18 + kick);
    sctx.lineTo(-30, 22 + kick);
    sctx.lineTo(-18, 22);
    sctx.closePath(); sctx.fill();
    sctx.beginPath();
    sctx.moveTo(-14, 18);
    sctx.lineTo(-26, 22 - kick);
    sctx.lineTo(-26, 26 - kick);
    sctx.lineTo(-14, 24);
    sctx.closePath(); sctx.fill();
    // mask reflection highlight
    sctx.fillStyle = 'rgba(255,255,255,0.35)';
    sctx.beginPath();
    sctx.ellipse(-3, -12, 4, 2, 0, 0, Math.PI * 2); sctx.fill();
    sctx.restore();
    // emit bubbles from helmet
    d.bubbleT -= dt;
    if (d.bubbleT <= 0) {
      d.bubbleT = 0.2;
      if (splashDecor) {
        for (var bi = 0; bi < 3; bi++) {
          splashDecor.bubbles.push({
            x: d.x + 12, y: d.y - 14 + rnd(-2, 2),
            r: rnd(1.8, 4), sp: rnd(30, 55),
            wob: Math.random() * Math.PI * 2, a: rnd(0.4, 0.7)
          });
        }
      }
    }
    d.x += d.sp * dt;
    if (d.x > sw + 60) { d.x = -100; d.y = rnd(sh * 0.4, sh * 0.65); }
  }

  function drawFish(x, y, scale, glow, angle) {
    var r = 22 * scale;
    sctx.save();
    sctx.translate(x, y);
    if (angle) sctx.rotate(angle);
    if (glow > 0) {
      var gg = sctx.createRadialGradient(0, 0, r * 0.4, 0, 0, r * 3.2);
      gg.addColorStop(0, 'rgba(255,184,77,' + (0.55 * glow) + ')');
      gg.addColorStop(1, 'rgba(255,184,77,0)');
      sctx.fillStyle = gg;
      sctx.beginPath(); sctx.arc(0, 0, r * 3.2, 0, Math.PI * 2); sctx.fill();
    }
    // tail
    sctx.fillStyle = '#b65a14';
    sctx.beginPath();
    sctx.moveTo(-r * 0.85, 0);
    sctx.lineTo(-r * 1.55, -r * 0.55);
    sctx.lineTo(-r * 1.55, r * 0.55);
    sctx.closePath(); sctx.fill();
    // spikes (extend dramatically when puffed)
    var puffT = Math.max(0, Math.min(1.6, (scale - 1) / 1.6));
    var spikeLen = r * (0.18 + puffT * 1.4);
    if (spikeLen > 1) {
      // shadow spikes first (darker, longer) for depth
      sctx.strokeStyle = '#5a1f06';
      sctx.lineWidth = Math.max(2.0, r * 0.11);
      sctx.lineCap = 'round';
      var spikeCount = 24;
      for (var i = 0; i < spikeCount; i++) {
        var ang = (i / spikeCount) * Math.PI * 2;
        sctx.beginPath();
        sctx.moveTo(Math.cos(ang) * r * 0.92, Math.sin(ang) * r * 0.92);
        sctx.lineTo(Math.cos(ang) * (r + spikeLen), Math.sin(ang) * (r + spikeLen));
        sctx.stroke();
      }
      // bright tip highlights when very puffed
      if (puffT > 0.4) {
        sctx.strokeStyle = 'rgba(255,220,140,' + (puffT * 0.9) + ')';
        sctx.lineWidth = Math.max(1.2, r * 0.05);
        for (var j = 0; j < spikeCount; j++) {
          var aj = (j / spikeCount) * Math.PI * 2;
          var tipX = Math.cos(aj) * (r + spikeLen);
          var tipY = Math.sin(aj) * (r + spikeLen);
          var midX = Math.cos(aj) * (r + spikeLen * 0.6);
          var midY = Math.sin(aj) * (r + spikeLen * 0.6);
          sctx.beginPath();
          sctx.moveTo(midX, midY);
          sctx.lineTo(tipX, tipY);
          sctx.stroke();
        }
      }
    }
    // body
    var bg = sctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.2, 0, 0, r);
    bg.addColorStop(0, '#ffe2a0');
    bg.addColorStop(0.6, '#e8943a');
    bg.addColorStop(1, '#a35515');
    sctx.fillStyle = bg;
    sctx.beginPath(); sctx.arc(0, 0, r, 0, Math.PI * 2); sctx.fill();
    // belly highlight
    sctx.fillStyle = 'rgba(255,240,200,0.5)';
    sctx.beginPath(); sctx.ellipse(-r * 0.05, r * 0.35, r * 0.55, r * 0.25, 0, 0, Math.PI * 2); sctx.fill();
    // eye
    sctx.fillStyle = '#fff';
    sctx.beginPath(); sctx.arc(r * 0.42, -r * 0.22, r * 0.22, 0, Math.PI * 2); sctx.fill();
    sctx.fillStyle = '#1a1a1f';
    sctx.beginPath(); sctx.arc(r * 0.48, -r * 0.22, r * 0.12, 0, Math.PI * 2); sctx.fill();
    sctx.fillStyle = 'rgba(255,255,255,0.9)';
    sctx.beginPath(); sctx.arc(r * 0.52, -r * 0.27, r * 0.05, 0, Math.PI * 2); sctx.fill();
    // mouth
    sctx.strokeStyle = '#5a2a08';
    sctx.lineWidth = Math.max(1, r * 0.06);
    sctx.beginPath();
    sctx.arc(r * 0.55, r * 0.18, r * 0.13, -0.3, 0.7);
    sctx.stroke();
    sctx.restore();
  }

  function drawBg() {
    var g = sctx.createLinearGradient(0, 0, 0, sh);
    g.addColorStop(0, '#021522');
    g.addColorStop(0.6, '#062a3a');
    g.addColorStop(1, '#0c4660');
    sctx.fillStyle = g;
    sctx.fillRect(0, 0, sw, sh);
  }

  function drawTitle(opacity) {
    if (opacity <= 0) return;
    sctx.save();
    sctx.globalAlpha = opacity;
    sctx.font = FONT;
    sctx.textAlign = 'center';
    sctx.textBaseline = 'middle';
    sctx.shadowColor = 'rgba(255,184,77,0.7)';
    sctx.shadowBlur = 26;
    sctx.fillStyle = '#eaf7ff';
    sctx.fillText(TITLE, sw / 2, sh / 2);
    sctx.restore();
  }

  function drawTrail(alphaScale) {
    for (var i = trail.length - 1; i >= 0; i--) {
      var b = trail[i];
      b.age += 1 / 60;
      if (b.age > b.life) { trail.splice(i, 1); continue; }
      var p = b.age / b.life;
      b.y -= 18 * (1 / 60);
      sctx.save();
      sctx.globalAlpha = (1 - p) * 0.7 * alphaScale;
      sctx.fillStyle = '#cfe9ff';
      sctx.beginPath();
      sctx.arc(b.x, b.y, b.r * (1 - p * 0.4), 0, Math.PI * 2);
      sctx.fill();
      sctx.restore();
    }
  }

  var splashLast = 0;
  function frame(now) {
    if (!startT) startT = now;
    var t = now - startT;
    var dt = Math.min(0.033, (now - (splashLast || now)) / 1000);
    splashLast = now;
    if (skipToPuff && t < 2000) { startT = now - 2000; t = 2000; skipToPuff = false; }

    drawBg();
    // Reef + bubbles + divers (rendered before the title fish so they sit behind it)
    drawSplashReef(t, dt);
    drawSplashBubbles(dt, now);
    if (splashDecor) {
      for (var dvi = 0; dvi < splashDecor.divers.length; dvi++) {
        drawScubaDiver(splashDecor.divers[dvi], now * 0.001, dt);
      }
    }

    var cx = sw / 2, cy = sh / 2;
    // measure title for fish path
    sctx.font = FONT;
    var tw = sctx.measureText(TITLE).width;
    var tLeft = cx - tw / 2 - 50;
    var tRight = cx + tw / 2 + 50;

    var fishX, fishY, fishScale = 1, fishGlow = 0, fishAngle = 0, titleOpacity = 0, trailAlpha = 1, fishVisible = true;

    if (t < 400) {
      // Phase 1: title fades in, no fish yet
      titleOpacity = easeOut(t / 400);
      fishVisible = false;
    } else if (t < 1600) {
      // Phase 2: swim left-to-right with sine weave through title
      titleOpacity = 1;
      var p = (t - 400) / 1200;
      fishX = tLeft + (tRight - tLeft) * p;
      fishY = cy + Math.sin(p * Math.PI * 5) * 38;
      // fish faces direction of motion
      var dy = Math.cos(p * Math.PI * 5) * Math.PI * 5 * 38 / (tRight - tLeft);
      fishAngle = Math.atan2(dy, 1);
      if (Math.random() < 0.85) {
        trail.push({ x: fishX - 16, y: fishY + rnd(-5, 5), r: rnd(2, 5), age: 0, life: rnd(0.6, 1.2) });
      }
    } else if (t < 2000) {
      // Phase 3: title + trail fade out, fish glides to center
      var pf = (t - 1600) / 400;
      titleOpacity = 1 - pf;
      trailAlpha = 1 - pf;
      var lastP = 1.0;
      var startX = tLeft + (tRight - tLeft) * lastP;
      var startY = cy + Math.sin(lastP * Math.PI * 5) * 38;
      var e = easeOut(pf);
      fishX = startX + (cx - startX) * e;
      fishY = startY + (cy - startY) * e;
      fishAngle = (1 - e) * 0.2;
    } else if (t < 2700) {
      // Phase 4: dramatic puff at center — quick inhale, then BIG bounce-out
      var pp = (t - 2000) / 700;
      fishX = cx; fishY = cy;
      if (pp < 0.18) {
        // small inhale (briefly squeeze under 1.0)
        fishScale = 1 - (pp / 0.18) * 0.12;
      } else {
        var q = (pp - 0.18) / 0.82;
        // overshoot bounce — peaks above target then settles
        var bounce = 1 + easeOut(q) * 1.6;             // 1 → 2.6
        var overshoot = Math.sin(q * Math.PI) * 0.18;  // small spike at the middle
        fishScale = bounce + overshoot;
      }
      fishGlow = Math.min(1, pp * 1.6);
      // Brief white flash at the moment the puff hits its peak
      if (pp > 0.55 && pp < 0.72) {
        var fl = 1 - Math.abs(pp - 0.635) / 0.085;
        sctx.save();
        sctx.fillStyle = 'rgba(255,245,210,' + (fl * 0.35) + ')';
        sctx.fillRect(0, 0, sw, sh);
        sctx.restore();
      }
    } else if (!dismissed) {
      // Phase 5: dismiss splash
      fishX = cx; fishY = cy;
      fishScale = 2.6; fishGlow = 1;
      drawFish(fishX, fishY, fishScale, fishGlow, 0);
      splash.classList.add('gone');
      dismissed = true;
      dismissAt = now;
      setTimeout(function() {
        if (splash.parentNode) splash.parentNode.removeChild(splash);
      }, 500);
      return;
    } else {
      return; // already dismissed
    }

    drawTitle(titleOpacity);
    drawTrail(trailAlpha);
    if (fishVisible) drawFish(fishX, fishY, fishScale, fishGlow, fishAngle);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function skip() { if (!dismissed) skipToPuff = true; }
  splash.addEventListener('click', skip);
  splash.addEventListener('touchstart', skip, { passive: true });
})();

function detectLocale() {
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  var tag = lang.split('-')[0];
  return STRINGS[tag] ? tag : 'en';
}
var currentLocale = detectLocale();
function t(key) {
  var s = STRINGS[currentLocale] || STRINGS.en;
  var v = s[key]; if (v === undefined) v = STRINGS.en[key];
  if (typeof v === 'function') return v.apply(null, Array.prototype.slice.call(arguments, 1));
  return v;
}
function nameOf(charId) {
  var s = STRINGS[currentLocale] || STRINGS.en;
  return (s.chars && s.chars[charId]) || STRINGS.en.chars[charId] || charId;
}
function applyLocale() {
  var $ = function(id) { return document.getElementById(id); };
  if ($('sub')) $('sub').textContent = t('sub');
  if ($('btn')) $('btn').textContent = t('diveIn');
  if ($('leaderboardBtn')) $('leaderboardBtn').textContent = t('leaderboard');
  if ($('achievementsBtn')) $('achievementsBtn').textContent = t('achievements');
  if ($('restoreBtn')) $('restoreBtn').textContent = t('restore');
  if ($('signInBtn')) {
    var siwaText = $('signInBtn').querySelector('.siwa-text');
    if (siwaText) siwaText.textContent = t('signIn');
    else $('signInBtn').textContent = t('signIn');
  }
  if ($('homeBtn')) $('homeBtn').textContent = t('home');
  if ($('moreBtn')) $('moreBtn').textContent = '⋯ ' + t('more');
  if ($('eraseBtn')) $('eraseBtn').textContent = t('erase');
  if ($('privacyLink')) $('privacyLink').textContent = t('privacy');
  if ($('termsLink')) $('termsLink').textContent = t('terms');
  if ($('pBuy')) $('pBuy').textContent = t('buy');
  if ($('pCancel')) $('pCancel').textContent = t('maybeLater');
  document.documentElement.setAttribute('lang', currentLocale);
}

// ---------- Characters ----------
// productId values must match the IAP products configured in App Store Connect.
var CHARACTERS = [
  { id: 'puffer',    name: 'Pufferfish', emoji: '🐡', free: true },
  { id: 'clownfish', name: 'Clownfish',  emoji: '🐠', price: 0.99, productId: 'com.wyrickstudios.WSPuffer.clownfish' },
  { id: 'swordfish', name: 'Swordfish',  emoji: '🐟', price: 0.99, productId: 'com.wyrickstudios.WSPuffer.swordfish' },
  { id: 'shark',     name: 'Shark',      emoji: '🦈', price: 0.99, productId: 'com.wyrickstudios.WSPuffer.shark' }
];
var OWNED_KEY = 'puff.owned';
function getOwned() {
  try { return JSON.parse(localStorage.getItem(OWNED_KEY) || '[]'); } catch(e) { return []; }
}
function saveOwned(arr) {
  try { localStorage.setItem(OWNED_KEY, JSON.stringify(arr)); } catch(e) {}
}
function ownsChar(id) {
  return getOwned().indexOf(id) !== -1;
}
var selectedChar = localStorage.getItem(CHAR_KEY) || 'puffer';
function isUnlocked(c) {
  if (c.free) return true;
  return ownsChar(c.id);
}

// ---------- IAP bridge (StoreKit 2 via native plugin) ----------
function getIAP() {
  return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.IAP) || null;
}
function isNativeIAP() {
  return !!getIAP() && window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
}
function charForProductId(pid) {
  for (var i = 0; i < CHARACTERS.length; i++) {
    if (CHARACTERS[i].productId === pid) return CHARACTERS[i];
  }
  return null;
}
var iapProducts = {}; // productId -> { displayPrice, ... }
function priceLabelFor(c) {
  var p = c.productId && iapProducts[c.productId];
  if (p && p.displayPrice) return p.displayPrice;
  return '$' + (c.price || 0).toFixed(2);
}
function loadIAPProducts() {
  var IAP = getIAP();
  if (!IAP) return;
  var ids = [];
  for (var i = 0; i < CHARACTERS.length; i++) {
    if (CHARACTERS[i].productId) ids.push(CHARACTERS[i].productId);
  }
  if (!ids.length) return;
  Promise.resolve(IAP.getProducts({ productIds: ids })).then(function(res) {
    (res.products || []).forEach(function(p) { iapProducts[p.id] = p; });
    var owned = getOwned();
    (res.owned || []).forEach(function(pid) {
      var ch = charForProductId(pid);
      if (ch && owned.indexOf(ch.id) === -1) owned.push(ch.id);
    });
    saveOwned(owned);
    renderChips();
  }).catch(function(e) { console.warn('IAP getProducts failed:', e); });
}
function findChar(id) {
  for (var i = 0; i < CHARACTERS.length; i++) if (CHARACTERS[i].id === id) return CHARACTERS[i];
  return CHARACTERS[0];
}
if (!isUnlocked(findChar(selectedChar))) selectedChar = 'puffer';

// ---------- Sound ----------
var soundOn = localStorage.getItem(SOUND_KEY) !== '0';
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function blip(freq, dur, type, vol) {
  if (!soundOn || !audioCtx) return;
  var t0 = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.15, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sndFlap() {
  ensureAudio();
  blip(380 + Math.random() * 60, 0.12, 'sine', 0.12);
  setTimeout(function() { blip(520 + Math.random() * 80, 0.08, 'sine', 0.08); }, 30);
}
function sndScore() { ensureAudio(); blip(880, 0.08, 'triangle', 0.1); setTimeout(function(){ blip(1320, 0.08, 'triangle', 0.08); }, 60); }
function sndDie() {
  ensureAudio();
  if (!soundOn || !audioCtx) return;
  var t0 = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, t0);
  o.frequency.exponentialRampToValueAtTime(80, t0 + 0.35);
  g.gain.setValueAtTime(0.18, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.35);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + 0.4);
}
