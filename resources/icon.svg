<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="ocean" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#1a7ea6"/>
      <stop offset="55%" stop-color="#0e6b8a"/>
      <stop offset="100%" stop-color="#062a3a"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="body" cx="38%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ffe7b3"/>
      <stop offset="55%" stop-color="#f5a13c"/>
      <stop offset="100%" stop-color="#9a4f15"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb84d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffb84d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jelly" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f8c6ff"/>
      <stop offset="60%" stop-color="#d97ee0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9a3aa3" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="jellyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e896ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e896ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#ocean)"/>

  <!-- sun rays -->
  <g opacity="0.5">
    <polygon points="180,0 280,0 360,1024 100,1024" fill="url(#ray)"/>
    <polygon points="420,0 520,0 600,1024 340,1024" fill="url(#ray)"/>
    <polygon points="660,0 760,0 840,1024 580,1024" fill="url(#ray)"/>
    <polygon points="900,0 1000,0 1080,1024 820,1024" fill="url(#ray)"/>
  </g>

  <!-- bubbles -->
  <g fill="#ffffff" opacity="0.18">
    <circle cx="120" cy="780" r="10"/>
    <circle cx="860" cy="200" r="14"/>
    <circle cx="940" cy="700" r="8"/>
    <circle cx="80"  cy="320" r="11"/>
    <circle cx="190" cy="140" r="7"/>
    <circle cx="780" cy="850" r="9"/>
  </g>
  <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.25">
    <circle cx="120" cy="780" r="10"/>
    <circle cx="860" cy="200" r="14"/>
    <circle cx="940" cy="700" r="8"/>
    <circle cx="80"  cy="320" r="11"/>
    <circle cx="190" cy="140" r="7"/>
    <circle cx="780" cy="850" r="9"/>
  </g>

  <!-- jellyfish (top-left, behind puffer) -->
  <g transform="translate(160 220)">
    <circle cx="0" cy="0" r="130" fill="url(#jellyGlow)"/>
    <!-- tentacles -->
    <g stroke="#d97ee0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85">
      <path d="M -50 50 Q -55 90 -42 130 T -48 180"/>
      <path d="M -25 55 Q -22 100 -32 140 T -22 190"/>
      <path d="M 0 58 Q 4 105 -6 145 T 4 195"/>
      <path d="M 25 55 Q 28 100 18 140 T 28 190"/>
      <path d="M 50 50 Q 55 90 42 130 T 48 180"/>
    </g>
    <!-- bell -->
    <path d="M -70 30 Q -75 -80 0 -78 Q 75 -80 70 30 Q 50 18 35 32 Q 18 18 0 32 Q -18 18 -35 32 Q -50 18 -70 30 Z" fill="url(#jelly)"/>
    <!-- highlight -->
    <ellipse cx="-22" cy="-40" rx="22" ry="8" transform="rotate(-20 -22 -40)" fill="#ffffff" opacity="0.45"/>
  </g>

  <!-- tiny fish school (top-right) -->
  <g fill="#a8e5ff" opacity="0.9">
    <g transform="translate(820 320)">
      <ellipse cx="0" cy="0" rx="14" ry="7"/>
      <polygon points="-14,0 -22,-7 -22,7"/>
      <circle cx="6" cy="-2" r="1.5" fill="#0a1424"/>
    </g>
    <g transform="translate(870 305)">
      <ellipse cx="0" cy="0" rx="11" ry="5.5"/>
      <polygon points="-11,0 -17,-5 -17,5"/>
      <circle cx="4" cy="-1.5" r="1.2" fill="#0a1424"/>
    </g>
    <g transform="translate(905 332)">
      <ellipse cx="0" cy="0" rx="9" ry="4.5"/>
      <polygon points="-9,0 -14,-4 -14,4"/>
    </g>
  </g>

  <!-- starfish on floor -->
  <g transform="translate(180 970)" fill="#ff6b4a">
    <polygon points="0,-26 8,-8 26,-8 12,4 18,22 0,12 -18,22 -12,4 -26,-8 -8,-8"/>
    <g fill="#c94a30">
      <circle cx="0" cy="-12" r="2.5"/>
      <circle cx="12" cy="6" r="2.5"/>
      <circle cx="-12" cy="6" r="2.5"/>
    </g>
  </g>
  <g transform="translate(880 975)" fill="#ffa047">
    <polygon points="0,-20 6,-6 20,-6 9,3 14,17 0,9 -14,17 -9,3 -20,-6 -6,-6"/>
  </g>

  <!-- seaweed -->
  <g stroke-linecap="round" fill="none">
    <path d="M 70 1024 Q 60 950 80 880 Q 90 820 60 760" stroke="#1f7a3a" stroke-width="14" opacity="0.9"/>
    <path d="M 70 1024 Q 60 950 80 880 Q 90 820 60 760" stroke="#3aa860" stroke-width="6" opacity="0.7"/>

    <path d="M 250 1024 Q 270 960 250 900 Q 230 850 260 800" stroke="#1f7a3a" stroke-width="12" opacity="0.85"/>
    <path d="M 250 1024 Q 270 960 250 900 Q 230 850 260 800" stroke="#3aa860" stroke-width="5" opacity="0.7"/>

    <path d="M 770 1024 Q 790 950 770 880 Q 750 820 790 770" stroke="#1f7a3a" stroke-width="13" opacity="0.85"/>
    <path d="M 770 1024 Q 790 950 770 880 Q 750 820 790 770" stroke="#3aa860" stroke-width="5" opacity="0.7"/>

    <path d="M 960 1024 Q 940 950 960 880 Q 980 820 950 760" stroke="#1f7a3a" stroke-width="14" opacity="0.9"/>
    <path d="M 960 1024 Q 940 950 960 880 Q 980 820 950 760" stroke="#3aa860" stroke-width="6" opacity="0.7"/>
  </g>

  <!-- sea floor shadow band -->
  <rect x="0" y="970" width="1024" height="54" fill="#04202c" opacity="0.55"/>

  <!-- soft glow behind pufferfish -->
  <circle cx="512" cy="540" r="430" fill="url(#glow)"/>

  <!-- spikes -->
  <g fill="#7a2f0a">
    <g transform="translate(512 540)">
      <g>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(0)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(22.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(45)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(67.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(90)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(112.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(135)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(157.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(180)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(202.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(225)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(247.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(270)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(292.5)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(315)"/>
        <polygon points="0,-340 14,-280 -14,-280" transform="rotate(337.5)"/>
      </g>
    </g>
  </g>

  <!-- tail behind body -->
  <g transform="translate(512 540)">
    <path d="M -260,0 L -360,-120 L -320,0 L -360,120 Z" fill="#c8631e"/>
  </g>

  <!-- side fins -->
  <g transform="translate(512 540)">
    <ellipse cx="-40" cy="220" rx="100" ry="42" transform="rotate(15)" fill="#d97326"/>
    <ellipse cx="-40" cy="-220" rx="100" ry="42" transform="rotate(-15)" fill="#d97326"/>
  </g>

  <!-- body -->
  <circle cx="512" cy="540" r="280" fill="url(#body)"/>

  <!-- belly highlight -->
  <ellipse cx="512" cy="620" rx="200" ry="120" fill="#fff5d2" opacity="0.55"/>

  <!-- top sheen -->
  <ellipse cx="430" cy="420" rx="130" ry="48" transform="rotate(-18 430 420)" fill="#ffffff" opacity="0.22"/>

  <!-- dot pattern -->
  <g fill="#78370f" opacity="0.5">
    <circle cx="540" cy="525" r="12"/>
    <circle cx="600" cy="590" r="12"/>
    <circle cx="470" cy="620" r="12"/>
    <circle cx="410" cy="510" r="12"/>
    <circle cx="530" cy="680" r="12"/>
  </g>

  <!-- eye -->
  <circle cx="640" cy="460" r="68" fill="#ffffff"/>
  <circle cx="660" cy="470" r="38" fill="#0a1424"/>
  <circle cx="673" cy="455" r="13" fill="#ffffff"/>

  <!-- surprised "o" mouth -->
  <ellipse cx="780" cy="560" rx="26" ry="32" fill="#3a1a05"/>

  <!-- blush -->
  <ellipse cx="700" cy="610" rx="48" ry="26" fill="#ff5050" opacity="0.4"/>
</svg>
